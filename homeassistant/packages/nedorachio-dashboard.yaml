# Device entities use text.* for string state (phase, outcome) and sensor.* for numeric.
views:
  - title: Nedorachio
    path: nedorachio-dashboard
    icon: mdi:sprinkler
    cards:
      - type: entities
        title: Nedorachio controls
        state_color: true
        entities:
          - entity: switch.nedorachio_irrigation_controller_zone_1
            name: Left
            secondary_info: last-changed
          - entity: switch.nedorachio_irrigation_controller_zone_2
            name: Right
            secondary_info: last-changed
          - entity: switch.nedorachio_irrigation_controller_zone_3
            name: Back
            secondary_info: last-changed
          - entity: switch.nedorachio_irrigation_controller_zone_4
            name: Drip
            secondary_info: last-changed
          - type: divider
          - entity: switch.nedorachio_irrigation_controller_fallback_schedule_enabled
            name: Master schedule
      - type: entities
        title: Nedorachio status
        entities:
          - entity: sensor.nedorachio_irrigation_controller_pressure
            name: Pressure (PSI)
          - entity: sensor.nedorachio_irrigation_controller_flow_rate_gpm
            name: Flow rate (GPM)
          - entity: sensor.nedorachio_irrigation_controller_currently_running_zone
            name: Running zone
          - entity: text.nedorachio_irrigation_controller_current_phase
            name: Current phase
          - entity: text.nedorachio_irrigation_controller_last_run_outcome
            name: Last run outcome
          - entity: sensor.nedorachio_last_stop_reason
            name: Last stop reason
          - entity: sensor.nedorachio_last_stop_flow_pressure_fault
            name: Last stop was flow/pressure fault
          - entity: binary_sensor.nedorachio_irrigation_controller_rain_sensor
            name: Rain sensor
          - type: divider
          - entity: sensor.openweathermap_rain_intensity
            name: Rain intensity (OpenWeatherMap)
          - entity: sensor.nedorachio_rain_observed_48h
            name: Rain observed 48h
      - type: entities
        title: Last watering (HA)
        entities:
          - entity: sensor.nedorachio_zone_1_last_watered
            name: Zone 1 (Left)
          - entity: sensor.nedorachio_zone_2_last_watered
            name: Zone 2 (Right)
          - entity: sensor.nedorachio_zone_3_last_watered
            name: Zone 3 (Back)
          - entity: sensor.nedorachio_zone_4_last_watered
            name: Zone 4 (Drip)
          - entity: sensor.nedorachio_zone_5_last_watered
            name: Zone 5
          - entity: sensor.nedorachio_zone_6_last_watered
            name: Zone 6
          - entity: sensor.nedorachio_zone_7_last_watered
            name: Zone 7
          - entity: sensor.nedorachio_zone_8_last_watered
            name: Zone 8
      - type: entities
        title: Next watering
        entities:
          - entity: sensor.nedorachio_zone_1_next_run_local
            name: Zone 1 next run (local)
          - entity: sensor.nedorachio_zone_2_next_run_local
            name: Zone 2 next run (local)
          - entity: sensor.nedorachio_zone_3_next_run_local
            name: Zone 3 next run (local)
          - entity: sensor.nedorachio_zone_4_next_run_local
            name: Zone 4 next run (local)
          - entity: sensor.nedorachio_zone_5_next_run_local
            name: Zone 5 next run (local)
          - entity: sensor.nedorachio_zone_6_next_run_local
            name: Zone 6 next run (local)
          - entity: sensor.nedorachio_zone_7_next_run_local
            name: Zone 7 next run (local)
          - entity: sensor.nedorachio_zone_8_next_run_local
            name: Zone 8 next run (local)
      - type: statistics-graph
        title: Gallons by zone (last 7 days)
        chart_type: bar
        days_to_show: 7
        period: day
        stat_types:
          - change
        entities:
          - entity: sensor.nedorachio_zone_1_gallons_lifetime
            name: Left
          - entity: sensor.nedorachio_zone_2_gallons_lifetime
            name: Right
          - entity: sensor.nedorachio_zone_3_gallons_lifetime
            name: Back
          - entity: sensor.nedorachio_zone_4_gallons_lifetime
            name: Drip
          - entity: sensor.nedorachio_zone_5_gallons_lifetime
            name: Zone 5
          - entity: sensor.nedorachio_zone_6_gallons_lifetime
            name: Zone 6
          - entity: sensor.nedorachio_zone_7_gallons_lifetime
            name: Zone 7
          - entity: sensor.nedorachio_zone_8_gallons_lifetime
            name: Zone 8
      - type: entities
        title: Gallons last 7 days (rolling)
        entities:
          - entity: sensor.nedorachio_zone_1_gallons_last_7_days
            name: Left
          - entity: sensor.nedorachio_zone_2_gallons_last_7_days
            name: Right
          - entity: sensor.nedorachio_zone_3_gallons_last_7_days
            name: Back
          - entity: sensor.nedorachio_zone_4_gallons_last_7_days
            name: Drip
          - entity: sensor.nedorachio_zone_5_gallons_last_7_days
            name: Zone 5
          - entity: sensor.nedorachio_zone_6_gallons_last_7_days
            name: Zone 6
          - entity: sensor.nedorachio_zone_7_gallons_last_7_days
            name: Zone 7
          - entity: sensor.nedorachio_zone_8_gallons_last_7_days
            name: Zone 8
