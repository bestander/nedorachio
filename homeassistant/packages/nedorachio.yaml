automation:
  - id: nedorachio_persist_weekly_delivered_last
    alias: "Nedorachio: persist last known weekly delivered"
    mode: queued
    max: 10
    trigger:
      - platform: state
        entity_id:
          - sensor.nedorachio_zone_1_weekly_delivered
          - sensor.nedorachio_zone_2_weekly_delivered
          - sensor.nedorachio_zone_3_weekly_delivered
          - sensor.nedorachio_zone_4_weekly_delivered
          - sensor.nedorachio_zone_5_weekly_delivered
          - sensor.nedorachio_zone_6_weekly_delivered
          - sensor.nedorachio_zone_7_weekly_delivered
          - sensor.nedorachio_zone_8_weekly_delivered
    action:
      - variables:
          zone_num: "{{ trigger.entity_id.split('_')[2] }}"
          lifetime: "{{ states('input_number.nedorachio_zone_' ~ zone_num ~ '_gallons_lifetime') | float(-1) }}"
          baseline: "{{ states('input_number.nedorachio_zone_' ~ zone_num ~ '_week_baseline_gallons') | float(-1) }}"
          delivered: "{{ trigger.to_state.state | float(-1) }}"
          last_id: "input_number.nedorachio_zone_{{ zone_num }}_weekly_delivered_last"
          last: "{{ states(last_id) | float(-1) }}"
      - condition: template
        value_template: >-
          {{ lifetime >= 0 and baseline >= 0 and delivered >= 0 and lifetime >= baseline
             and delivered | float(0) != last | float(-1) }}
      - action: input_number.set_value
        target:
          entity_id: "{{ last_id }}"
        data:
          value: "{{ delivered | float(0) | round(1) }}"

  - id: nedorachio_sync_zone_gallons_lifetime
    alias: "Nedorachio: sync HA-persisted zone gallons lifetime"
    mode: queued
    max: 10
    trigger:
      - platform: homeassistant
        event: start
        id: ha_start
      - platform: state
        entity_id:
          - sensor.nedorachio_irrigation_controller_zone_1_gallons_total
          - sensor.nedorachio_irrigation_controller_zone_2_gallons_total
          - sensor.nedorachio_irrigation_controller_zone_3_gallons_total
          - sensor.nedorachio_irrigation_controller_zone_4_gallons_total
          - sensor.nedorachio_irrigation_controller_zone_5_gallons_total
          - sensor.nedorachio_irrigation_controller_zone_6_gallons_total
          - sensor.nedorachio_irrigation_controller_zone_7_gallons_total
          - sensor.nedorachio_irrigation_controller_zone_8_gallons_total
        id: device_total
    action:
      - choose:
          - conditions:
              - condition: trigger
                id: ha_start
            sequence:
              - delay: "00:00:03"
              - repeat:
                  for_each:
                    - "1"
                    - "2"
                    - "3"
                    - "4"
                    - "5"
                    - "6"
                    - "7"
                    - "8"
                  sequence:
                    - variables:
                        stored_id: "input_number.nedorachio_zone_{{ repeat.item }}_gallons_lifetime"
                        baseline_id: "input_number.nedorachio_zone_{{ repeat.item }}_week_baseline_gallons"
                        last_id: "input_number.nedorachio_zone_{{ repeat.item }}_weekly_delivered_last"
                        stored: "{{ states(stored_id) | float(0) }}"
                        baseline: "{{ states(baseline_id) | float(0) }}"
                        last: "{{ states(last_id) | float(0) }}"
                        seed: "{{ (baseline | float(0) + last | float(0)) | round(1) }}"
                    - condition: template
                      value_template: >-
                        {{ baseline | float(0) > 0 and last | float(0) > 0
                           and stored | float(0) < baseline | float(0) }}
                    - action: input_number.set_value
                      target:
                        entity_id: "{{ stored_id }}"
                      data:
                        value: "{{ seed }}"
      - repeat:
          for_each:
            - "1"
            - "2"
            - "3"
            - "4"
            - "5"
            - "6"
            - "7"
            - "8"
          sequence:
            - variables:
                device_id: "sensor.nedorachio_irrigation_controller_zone_{{ repeat.item }}_gallons_total"
                stored_id: "input_number.nedorachio_zone_{{ repeat.item }}_gallons_lifetime"
                baseline_id: "input_number.nedorachio_zone_{{ repeat.item }}_week_baseline_gallons"
                last_id: "input_number.nedorachio_zone_{{ repeat.item }}_weekly_delivered_last"
                device: >-
                  {% if states(device_id) not in ['unknown','unavailable','none', None] %}
                    {{ states(device_id) | float(0) }}
                  {% else %}
                    -1
                  {% endif %}
                stored: "{{ states(stored_id) | float(0) }}"
                baseline: "{{ states(baseline_id) | float(0) }}"
                last: "{{ states(last_id) | float(0) }}"
                new_lifetime: >-
                  {% set s = stored | float(0) %}
                  {% set b = baseline | float(0) %}
                  {% set d = device | float(-1) %}
                  {% set l = last | float(0) %}
                  {% if d >= 0 %}
                    {{ [s, d, b + l if b > 0 and l > 0 else 0] | max }}
                  {% elif s == 0 and b > 0 and l > 0 %}
                    {{ (b + l) | round(1) }}
                  {% elif s == 0 and b > 0 %}
                    {{ b }}
                  {% else %}
                    {{ s }}
                  {% endif %}
            - condition: template
              value_template: "{{ new_lifetime | float(0) > stored | float(0) }}"
            - action: input_number.set_value
              target:
                entity_id: "{{ stored_id }}"
              data:
                value: "{{ new_lifetime | float(0) | round(1) }}"

  - id: nedorachio_weekly_baseline_reset
    alias: "Nedorachio: reset weekly gallon baselines (Monday)"
    trigger:
      - platform: time
        at: "00:00:00"
    condition:
      - condition: time
        weekday:
          - mon
    action:
      - repeat:
          for_each:
            - "1"
            - "2"
            - "3"
            - "4"
            - "5"
            - "6"
            - "7"
            - "8"
          sequence:
            - action: input_number.set_value
              target:
                entity_id: "input_number.nedorachio_zone_{{ repeat.item }}_week_baseline_gallons"
              data:
                value: >-
                  {{ states('sensor.nedorachio_zone_' ~ repeat.item ~ '_gallons_lifetime') | float(0) }}
            - action: input_number.set_value
              target:
                entity_id: "input_number.nedorachio_zone_{{ repeat.item }}_weekly_delivered_last"
              data:
                value: "0"
            - action: input_number.set_value
              target:
                entity_id: input_number.nedorachio_rain_week_baseline_mm
              data:
                value: >-
                  {{ states('input_number.nedorachio_rain_lifetime_mm') | float(0) }}

  - id: nedorachio_rain_lifetime_accumulator
    alias: "Nedorachio: accumulate rain into lifetime total"
    trigger:
      - platform: time_pattern
        minutes: "/10"
    action:
      - variables:
          intensity: >-
            {% set obs_id = 'sensor.nedorachio_rain_intensity_input' %}
            {% if states(obs_id) not in ['unknown','unavailable','none', None] %}
              {{ states(obs_id) | float(0) }}
            {% else %}
              0.0
            {% endif %}
          delta_mm: "{{ intensity | float(0) * 10 / 60 }}"
          new_lifetime: >-
            {{ states('input_number.nedorachio_rain_lifetime_mm') | float(0) + (delta_mm | float(0)) }}
      - action: input_number.set_value
        target:
          entity_id: input_number.nedorachio_rain_lifetime_mm
        data:
          value: "{{ new_lifetime | float(0) | round(2) }}"

  - id: nedorachio_weather_feeder
    alias: "Nedorachio: push weekly rain to controller"
    trigger:
      - platform: time_pattern
        minutes: "/10"
      - platform: state
        entity_id: sensor.nedorachio_rain_observed_week
    action:
      - variables:
          rain_mm: >-
            {% set obs_id = 'sensor.nedorachio_rain_observed_week' %}
            {% if states(obs_id) not in ['unknown','unavailable','none', None] %}
              {{ states(obs_id) | float(0) }}
            {% else %}
              0.0
            {% endif %}
          current_mm: >-
            {{ states('number.nedorachio_irrigation_controller_rain_mm_this_week') | float(-1) }}
      - condition: template
        value_template: "{{ (rain_mm | float(0)) != (current_mm | float(-1)) }}"
      - action: number.set_value
        target:
          entity_id: number.nedorachio_irrigation_controller_rain_mm_this_week
        data:
          value: "{{ rain_mm }}"

  - id: nedorachio_alarm_notify
    alias: "Nedorachio: run outcome notifications"
    mode: parallel
    trigger:
      - platform: state
        entity_id: text.nedorachio_irrigation_controller_last_run_outcome
    condition:
      - condition: template
        value_template: >-
          {{ trigger.to_state.state.startswith('cancelled_') or trigger.to_state.state.startswith('failed_') }}
    action:
      - variables:
          outcome: "{{ trigger.to_state.state }}"
          zone: "{{ states('sensor.nedorachio_irrigation_controller_currently_running_zone') }}"
          phase: "{{ states('text.nedorachio_irrigation_controller_current_phase') }}"
          psi: "{{ states('sensor.nedorachio_irrigation_controller_pressure') }}"
          gpm: "{{ states('sensor.nedorachio_irrigation_controller_flow_rate_gpm') }}"
      - action: notify.notify
        data:
          title: "Nedorachio: {{ outcome }}"
          message: "Phase {{ phase }}, zone {{ zone }}. PSI {{ psi }}, flow {{ gpm }} gpm."

