automation:
  - id: nedorachio_weekly_baseline_reset
    alias: "Nedorachio: reset weekly gallon baselines (Monday)"
    trigger:
      - platform: time
        at: "00:00:00"
    condition:
      - condition: time
        weekday:
          - mon
    action:
      - repeat:
          for_each:
            - "1"
            - "2"
            - "3"
            - "4"
            - "5"
            - "6"
            - "7"
            - "8"
          sequence:
            - action: input_number.set_value
              target:
                entity_id: "input_number.nedorachio_zone_{{ repeat.item }}_week_baseline_gallons"
              data:
                value: >-
                  {{ states('sensor.nedorachio_zone_' ~ repeat.item ~ '_gallons_lifetime') | float(0) }}
            - action: input_number.set_value
              target:
                entity_id: input_number.nedorachio_rain_week_baseline_mm
              data:
                value: >-
                  {{ states('input_number.nedorachio_rain_lifetime_mm') | float(0) }}

  - id: nedorachio_rain_lifetime_accumulator
    alias: "Nedorachio: accumulate rain into lifetime total"
    trigger:
      - platform: time_pattern
        minutes: "/10"
    action:
      - variables:
          intensity: >-
            {% set obs_id = 'sensor.nedorachio_rain_intensity_input' %}
            {% if states(obs_id) not in ['unknown','unavailable','none', None] %}
              {{ states(obs_id) | float(0) }}
            {% else %}
              0.0
            {% endif %}
          delta_mm: "{{ intensity | float(0) * 10 / 60 }}"
          new_lifetime: >-
            {{ states('input_number.nedorachio_rain_lifetime_mm') | float(0) + (delta_mm | float(0)) }}
      - action: input_number.set_value
        target:
          entity_id: input_number.nedorachio_rain_lifetime_mm
        data:
          value: "{{ new_lifetime | float(0) | round(2) }}"

  - id: nedorachio_weather_feeder
    alias: "Nedorachio: push weekly rain to controller"
    trigger:
      - platform: time_pattern
        minutes: "/10"
      - platform: state
        entity_id: sensor.nedorachio_rain_observed_week
    action:
      - variables:
          rain_mm: >-
            {% set obs_id = 'sensor.nedorachio_rain_observed_week' %}
            {% if states(obs_id) not in ['unknown','unavailable','none', None] %}
              {{ states(obs_id) | float(0) }}
            {% else %}
              0.0
            {% endif %}
          current_mm: >-
            {{ states('number.nedorachio_irrigation_controller_rain_mm_this_week') | float(-1) }}
      - condition: template
        value_template: "{{ (rain_mm | float(0)) != (current_mm | float(-1)) }}"
      - action: number.set_value
        target:
          entity_id: number.nedorachio_irrigation_controller_rain_mm_this_week
        data:
          value: "{{ rain_mm }}"

  - id: nedorachio_alarm_notify
    alias: "Nedorachio: run outcome notifications"
    mode: parallel
    trigger:
      - platform: state
        entity_id: text.nedorachio_irrigation_controller_last_run_outcome
    condition:
      - condition: template
        value_template: >-
          {{ trigger.to_state.state.startswith('cancelled_') or trigger.to_state.state.startswith('failed_') }}
    action:
      - variables:
          outcome: "{{ trigger.to_state.state }}"
          zone: "{{ states('sensor.nedorachio_irrigation_controller_currently_running_zone') }}"
          phase: "{{ states('text.nedorachio_irrigation_controller_current_phase') }}"
          psi: "{{ states('sensor.nedorachio_irrigation_controller_pressure') }}"
          gpm: "{{ states('sensor.nedorachio_irrigation_controller_flow_rate_gpm') }}"
      - action: notify.notify
        data:
          title: "Nedorachio: {{ outcome }}"
          message: "Phase {{ phase }}, zone {{ zone }}. PSI {{ psi }}, flow {{ gpm }} gpm."

