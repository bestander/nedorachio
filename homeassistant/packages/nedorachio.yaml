# Nedorachio Home Assistant package: weather feeder, notifications, dashboard.
#
# Copy this file into your HA config under `packages/`. Make sure your
# `configuration.yaml` has:
#
#   homeassistant:
#     packages: !include_dir_named packages
#
# Replace `weather.your_local_forecast` with your actual weather entity.
# Replace `sensor.rain_observed_48h` with whatever observed-rain sensor you
# have. If you don't have one, leave the template — it falls back to 0 and
# the device's rain-sensor + static-pressure gates still protect the system.

automation:
  - id: nedorachio_weather_feeder
    alias: "Nedorachio: push 48h rain to controller"
    trigger:
      - platform: time_pattern
        minutes: "/10"
    action:
      - variables:
          rain_mm: >-
            {% set obs_id = 'sensor.rain_observed_48h' %}
            {% if states(obs_id) not in ['unknown','unavailable','none', None] %}
              {{ states(obs_id) | float(0) }}
            {% else %}
              0.0
            {% endif %}
          current_mm: >-
            {{ states('number.nedorachio_irrigation_controller_rain_mm_last_48h') | float(-1) }}
      - condition: template
        value_template: "{{ (rain_mm | float(0)) != (current_mm | float(-1)) }}"
      - service: number.set_value
        target:
          entity_id: number.nedorachio_irrigation_controller_rain_mm_last_48h
        data:
          value: "{{ rain_mm }}"

  - id: nedorachio_log_schedule_gate
    alias: "Nedorachio: log schedule gate reason"
    mode: queued
    max: 20
    trigger:
      - platform: state
        entity_id: sensor.nedorachio_irrigation_controller_last_schedule_gate_reason
    condition:
      - condition: template
        value_template: >-
          {% set r = trigger.to_state.state %}
          {{ r not in ['none', 'nothing_due', 'unknown', 'unavailable', ''] }}
      - condition: template
        value_template: "{{ trigger.to_state.state != trigger.from_state.state }}"
    action:
      - service: logbook.log
        data:
          name: Nedorachio
          message: >-
            Schedule did not start: {{ trigger.to_state.state | replace('_', ' ') }}
            {% set z = states('sensor.nedorachio_irrigation_controller_schedule_gate_due_zone') | int(0) %}
            {% if z > 0 %}(zone {{ z }} due){% endif %}.
            Phase {{ states('sensor.nedorachio_irrigation_controller_current_phase') }}.
          entity_id: sensor.nedorachio_irrigation_controller_next_due_zone

  - id: nedorachio_log_preflight_block
    alias: "Nedorachio: log pre-flight block"
    mode: queued
    max: 20
    trigger:
      - platform: state
        entity_id: sensor.nedorachio_irrigation_controller_last_pre_flight_failure_reason
    condition:
      - condition: template
        value_template: >-
          {% set r = trigger.to_state.state %}
          {{ r not in ['none', 'unknown', 'unavailable', ''] }}
      - condition: template
        value_template: "{{ trigger.to_state.state != trigger.from_state.state }}"
    action:
      - service: logbook.log
        data:
          name: Nedorachio
          message: >-
            Pre-flight blocked run: {{ trigger.to_state.state | replace('_', ' ') }}.
            Next due zone {{ states('sensor.nedorachio_irrigation_controller_next_due_zone') }}.
            PSI {{ states('sensor.nedorachio_irrigation_controller_pressure') }},
            rain 48h {{ states('number.nedorachio_irrigation_controller_rain_mm_last_48h') }} mm.
          entity_id: sensor.nedorachio_irrigation_controller_last_pre_flight_failure_reason

  - id: nedorachio_log_zone_started
    alias: "Nedorachio: log zone started"
    trigger:
      - platform: state
        entity_id: sensor.nedorachio_irrigation_controller_currently_running_zone
    condition:
      - condition: template
        value_template: "{{ trigger.to_state.state | int(0) > 0 }}"
      - condition: template
        value_template: "{{ trigger.from_state.state | int(0) == 0 }}"
    action:
      - service: logbook.log
        data:
          name: Nedorachio
          message: >-
            Zone {{ trigger.to_state.state }} valve opened.
            Phase {{ states('sensor.nedorachio_irrigation_controller_current_phase') }}.
          entity_id: sensor.nedorachio_irrigation_controller_currently_running_zone

  - id: nedorachio_log_zone_finished
    alias: "Nedorachio: log zone finished"
    trigger:
      - platform: state
        entity_id: sensor.nedorachio_irrigation_controller_currently_running_zone
    condition:
      - condition: template
        value_template: "{{ trigger.to_state.state | int(0) == 0 }}"
      - condition: template
        value_template: "{{ trigger.from_state.state | int(0) > 0 }}"
    action:
      - service: logbook.log
        data:
          name: Nedorachio
          message: >-
            Zone {{ trigger.from_state.state }} valve closed.
            Outcome {{ states('sensor.nedorachio_irrigation_controller_last_run_outcome') }}.
          entity_id: sensor.nedorachio_irrigation_controller_last_run_outcome

  - id: nedorachio_alarm_notify
    alias: "Nedorachio: alarm notifications"
    mode: parallel
    trigger:
      - platform: state
        entity_id:
          - binary_sensor.nedorachio_irrigation_controller_alarm_no_flow
          - binary_sensor.nedorachio_irrigation_controller_alarm_high_flow
          - binary_sensor.nedorachio_irrigation_controller_alarm_phantom_flow
          - binary_sensor.nedorachio_irrigation_controller_alarm_low_pressure
          - binary_sensor.nedorachio_irrigation_controller_alarm_high_pressure
          - binary_sensor.nedorachio_irrigation_controller_alarm_pre_flight_failed
          - binary_sensor.nedorachio_irrigation_controller_alarm_runtime_exceeded
        to: "on"
    action:
      - variables:
          alarm_name: "{{ trigger.to_state.attributes.friendly_name }}"
          zone: "{{ states('sensor.nedorachio_irrigation_controller_currently_running_zone') }}"
          phase: "{{ states('sensor.nedorachio_irrigation_controller_current_phase') }}"
          preflight_reason: "{{ states('sensor.nedorachio_irrigation_controller_last_pre_flight_failure_reason') }}"
          psi: "{{ states('sensor.nedorachio_irrigation_controller_pressure') }}"
          gpm: "{{ states('sensor.nedorachio_irrigation_controller_flow_rate_gpm') }}"
      # Replace `notify.notify` with your actual notify target,
      # e.g. `notify.mobile_app_yourphone`.
      - service: notify.notify
        data:
          title: "Nedorachio: {{ alarm_name }}"
          message: >-
            Phase {{ phase }}, zone {{ zone }}.
            Pre-flight reason {{ preflight_reason }}.
            PSI {{ psi }}, flow {{ gpm }} gpm.

  - id: nedorachio_apply_profile_on_start
    alias: "Nedorachio: apply config profile on start"
    trigger:
      - platform: homeassistant
        event: start
    action:
      - service: script.turn_on
        target:
          entity_id: script.nedorachio_apply_config_profile

  - id: nedorachio_apply_profile_on_reload
    alias: "Nedorachio: apply config profile on reload"
    trigger:
      - platform: event
        event_type: automation_reloaded
    action:
      - service: script.turn_on
        target:
          entity_id: script.nedorachio_apply_config_profile

  - id: nedorachio_apply_profile_on_change
    alias: "Nedorachio: apply config profile on profile change"
    trigger:
      - platform: state
        entity_id: sensor.nedorachio_config_profile
        attribute: profile
    action:
      - service: script.turn_on
        target:
          entity_id: script.nedorachio_apply_config_profile

script:
  nedorachio_apply_config_profile:
    alias: "Nedorachio: apply config profile"
    mode: single
    sequence:
      - variables:
          cfg: "{{ (state_attr('sensor.nedorachio_config_profile', 'profile') | default('{}', true)) | from_json }}"
      - if:
          - condition: template
            value_template: "{{ cfg is mapping and cfg.get('zones') is mapping and cfg.get('global') is mapping }}"
        then:
          - variables:
              start_parts: "{{ (cfg.global.watering_window.start | default('00:00')).split(':') }}"
              end_parts: "{{ (cfg.global.watering_window.end | default('08:00')).split(':') }}"
              weekdays: "{{ cfg.global.blackout.weekdays | default([], true) }}"
              blackout_mask: >-
                {% set ns = namespace(mask=0) %}
                {% set idx = {'mon':0,'tue':1,'wed':2,'thu':3,'fri':4,'sat':5,'sun':6} %}
                {% for d in weekdays %}
                  {% set i = idx.get((d|string)|lower) %}
                  {% if i is not none %}
                    {% set ns.mask = ns.mask + (2 ** i) %}
                  {% endif %}
                {% endfor %}
                {{ ns.mask }}
              zone_mask: >-
                {% set ns = namespace(mask=0) %}
                {% for zid in range(1, 9) %}
                  {% set z = cfg.zones.get(zid|string, {}) %}
                  {% if z.get('enabled', false) %}
                    {% set ns.mask = ns.mask + (2 ** (zid - 1)) %}
                  {% endif %}
                {% endfor %}
                {{ ns.mask }}
          - service: number.set_value
            target:
              entity_id: number.nedorachio_irrigation_controller_schedule_start_hour
            data:
              value: "{{ start_parts[0] | int(0) }}"
          - service: number.set_value
            target:
              entity_id: number.nedorachio_irrigation_controller_schedule_start_minute
            data:
              value: "{{ start_parts[1] | int(0) }}"
          - service: number.set_value
            target:
              entity_id: number.nedorachio_irrigation_controller_schedule_end_hour
            data:
              value: "{{ end_parts[0] | int(8) }}"
          - service: number.set_value
            target:
              entity_id: number.nedorachio_irrigation_controller_schedule_end_minute
            data:
              value: "{{ end_parts[1] | int(0) }}"
          - service: number.set_value
            target:
              entity_id: number.nedorachio_irrigation_controller_attempt_cooldown_minutes
            data:
              value: "{{ cfg.global.attempt_cooldown_minutes | default(20) | float(20) }}"
          - service: number.set_value
            target:
              entity_id: number.nedorachio_irrigation_controller_rain_mm_threshold_48h
            data:
              value: "{{ cfg.global.rain_accumulation_threshold_mm_48h | default(5) | float(5) }}"
          - service: number.set_value
            target:
              entity_id: number.nedorachio_irrigation_controller_rain_hold_hours_after_forecast
            data:
              value: "{{ cfg.global.rain_accumulation_hold_hours_after_threshold | default(24) | float(24) }}"
          - service: number.set_value
            target:
              entity_id: number.nedorachio_irrigation_controller_maximum_runtime_minutes
            data:
              value: "{{ cfg.global.maximum_runtime_minutes | default(60) | float(60) }}"
          - service: number.set_value
            target:
              entity_id: number.nedorachio_irrigation_controller_blackout_weekday_bitmask
            data:
              value: "{{ blackout_mask | int(0) }}"
          - service: number.set_value
            target:
              entity_id: number.nedorachio_irrigation_controller_zones_enabled_bitmask
            data:
              value: "{{ zone_mask | int(0) }}"
          - repeat:
              for_each: "{{ range(1, 9) | list }}"
              sequence:
                - variables:
                    zid: "{{ repeat.item }}"
                    z: "{{ cfg.zones.get((repeat.item|string), {}) }}"
                    mode_value: "{{ 1 if (z.get('mode', 'gallons_target') == 'gallons_target') else 0 }}"
                - service: number.set_value
                  target:
                    entity_id: "{{ 'number.nedorachio_irrigation_controller_zone_' ~ zid ~ '_schedule_mode' }}"
                  data:
                    value: "{{ mode_value | int(1) }}"
                - service: number.set_value
                  target:
                    entity_id: "{{ 'number.nedorachio_irrigation_controller_zone_' ~ zid ~ '_goal_gallons_per_cycle' }}"
                  data:
                    value: "{{ z.get('goal_gallons_per_cycle', 100) | float(100) }}"
                - service: number.set_value
                  target:
                    entity_id: "{{ 'number.nedorachio_irrigation_controller_zone_' ~ zid ~ '_cycle_gallons' }}"
                  data:
                    value: "{{ z.get('cycle_gallons', 50) | float(50) }}"
                - service: number.set_value
                  target:
                    entity_id: "{{ 'number.nedorachio_irrigation_controller_zone_' ~ zid ~ '_soak_minutes' }}"
                  data:
                    value: "{{ z.get('soak_minutes', 15) | float(15) }}"
                - service: number.set_value
                  target:
                    entity_id: "{{ 'number.nedorachio_irrigation_controller_zone_' ~ zid ~ '_minimum_interval_hours' }}"
                  data:
                    value: "{{ z.get('minimum_interval_hours', 72) | float(72) }}"
                - service: number.set_value
                  target:
                    entity_id: "{{ 'number.nedorachio_irrigation_controller_zone_' ~ zid ~ '_start_minimum_psi' }}"
                  data:
                    value: "{{ z.get('start_minimum_psi', 35) | float(35) }}"
                - service: number.set_value
                  target:
                    entity_id: "{{ 'number.nedorachio_irrigation_controller_zone_' ~ zid ~ '_start_maximum_psi' }}"
                  data:
                    value: "{{ z.get('start_maximum_psi', 85) | float(85) }}"
                - service: number.set_value
                  target:
                    entity_id: "{{ 'number.nedorachio_irrigation_controller_zone_' ~ zid ~ '_minimum_running_psi' }}"
                  data:
                    value: "{{ z.get('minimum_running_psi', 20) | float(20) }}"
                - service: number.set_value
                  target:
                    entity_id: "{{ 'number.nedorachio_irrigation_controller_zone_' ~ zid ~ '_minimum_running_psi_grace_seconds' }}"
                  data:
                    value: "{{ z.get('minimum_running_psi_grace_seconds', 600) | float(600) }}"
                - service: number.set_value
                  target:
                    entity_id: "{{ 'number.nedorachio_irrigation_controller_zone_' ~ zid ~ '_minimum_flow_gpm' }}"
                  data:
                    value: "{{ z.get('minimum_flow_gpm', 0.2) | float(0.2) }}"
                - service: number.set_value
                  target:
                    entity_id: "{{ 'number.nedorachio_irrigation_controller_zone_' ~ zid ~ '_maximum_flow_gpm' }}"
                  data:
                    value: "{{ z.get('maximum_flow_gpm', 12.0) | float(12.0) }}"
                - service: number.set_value
                  target:
                    entity_id: "{{ 'number.nedorachio_irrigation_controller_zone_' ~ zid ~ '_total_minutes' }}"
                  data:
                    value: "{{ z.get('total_minutes', 20) | float(20) }}"
                - service: number.set_value
                  target:
                    entity_id: "{{ 'number.nedorachio_irrigation_controller_zone_' ~ zid ~ '_cycle_minutes' }}"
                  data:
                    value: "{{ z.get('cycle_minutes', 10) | float(10) }}"

template:
  - sensor:
      - name: "Nedorachio last stop reason"
        state: >-
          {% set outcome = states('sensor.nedorachio_irrigation_controller_last_run_outcome') %}
          {% if outcome.startswith('cancelled_') %}
            {{ outcome | replace('cancelled_', '') }}
          {% else %}
            none
          {% endif %}
      - name: "Nedorachio last stop flow/pressure fault"
        state: >-
          {% set reason = states('sensor.nedorachio_last_stop_reason') %}
          {% if reason in ['no_flow', 'high_flow', 'low_pressure', 'high_pressure'] %}
            yes
          {% else %}
            no
          {% endif %}
      # Next-run timestamps come from the controller (window + blackout + serial queue).
      - name: "Nedorachio zone 1 next run"
        device_class: timestamp
        state: >-
          {% set e = states('sensor.nedorachio_irrigation_controller_zone_1_scheduled_next_start_epoch') %}
          {% if e in ['unknown', 'unavailable', 'none', None] or e | float(default=-1) <= 0 %}
            {{ none }}
          {% else %}
            {{ as_datetime(e | int) }}
          {% endif %}
      - name: "Nedorachio zone 2 next run"
        device_class: timestamp
        state: >-
          {% set e = states('sensor.nedorachio_irrigation_controller_zone_2_scheduled_next_start_epoch') %}
          {% if e in ['unknown', 'unavailable', 'none', None] or e | float(default=-1) <= 0 %}
            {{ none }}
          {% else %}
            {{ as_datetime(e | int) }}
          {% endif %}
      - name: "Nedorachio zone 3 next run"
        device_class: timestamp
        state: >-
          {% set e = states('sensor.nedorachio_irrigation_controller_zone_3_scheduled_next_start_epoch') %}
          {% if e in ['unknown', 'unavailable', 'none', None] or e | float(default=-1) <= 0 %}
            {{ none }}
          {% else %}
            {{ as_datetime(e | int) }}
          {% endif %}
      - name: "Nedorachio zone 4 next run"
        device_class: timestamp
        state: >-
          {% set e = states('sensor.nedorachio_irrigation_controller_zone_4_scheduled_next_start_epoch') %}
          {% if e in ['unknown', 'unavailable', 'none', None] or e | float(default=-1) <= 0 %}
            {{ none }}
          {% else %}
            {{ as_datetime(e | int) }}
          {% endif %}
      - name: "Nedorachio zone 5 next run"
        device_class: timestamp
        state: >-
          {% set e = states('sensor.nedorachio_irrigation_controller_zone_5_scheduled_next_start_epoch') %}
          {% if e in ['unknown', 'unavailable', 'none', None] or e | float(default=-1) <= 0 %}
            {{ none }}
          {% else %}
            {{ as_datetime(e | int) }}
          {% endif %}
      - name: "Nedorachio zone 6 next run"
        device_class: timestamp
        state: >-
          {% set e = states('sensor.nedorachio_irrigation_controller_zone_6_scheduled_next_start_epoch') %}
          {% if e in ['unknown', 'unavailable', 'none', None] or e | float(default=-1) <= 0 %}
            {{ none }}
          {% else %}
            {{ as_datetime(e | int) }}
          {% endif %}
      - name: "Nedorachio zone 7 next run"
        device_class: timestamp
        state: >-
          {% set e = states('sensor.nedorachio_irrigation_controller_zone_7_scheduled_next_start_epoch') %}
          {% if e in ['unknown', 'unavailable', 'none', None] or e | float(default=-1) <= 0 %}
            {{ none }}
          {% else %}
            {{ as_datetime(e | int) }}
          {% endif %}
      - name: "Nedorachio zone 8 next run"
        device_class: timestamp
        state: >-
          {% set e = states('sensor.nedorachio_irrigation_controller_zone_8_scheduled_next_start_epoch') %}
          {% if e in ['unknown', 'unavailable', 'none', None] or e | float(default=-1) <= 0 %}
            {{ none }}
          {% else %}
            {{ as_datetime(e | int) }}
          {% endif %}
      - name: "Nedorachio zone 1 next run local"
        state: >-
          {% set ts = as_timestamp(states('sensor.nedorachio_zone_1_next_run'), default=0) | int(0) %}
          {% if ts <= 0 %}
            unknown
          {% else %}
            {{ ts | timestamp_custom('%Y-%m-%d %H:%M', true) }}
          {% endif %}
      - name: "Nedorachio zone 2 next run local"
        state: >-
          {% set ts = as_timestamp(states('sensor.nedorachio_zone_2_next_run'), default=0) | int(0) %}
          {% if ts <= 0 %}
            unknown
          {% else %}
            {{ ts | timestamp_custom('%Y-%m-%d %H:%M', true) }}
          {% endif %}
      - name: "Nedorachio zone 3 next run local"
        state: >-
          {% set ts = as_timestamp(states('sensor.nedorachio_zone_3_next_run'), default=0) | int(0) %}
          {% if ts <= 0 %}
            unknown
          {% else %}
            {{ ts | timestamp_custom('%Y-%m-%d %H:%M', true) }}
          {% endif %}
      - name: "Nedorachio zone 4 next run local"
        state: >-
          {% set ts = as_timestamp(states('sensor.nedorachio_zone_4_next_run'), default=0) | int(0) %}
          {% if ts <= 0 %}
            unknown
          {% else %}
            {{ ts | timestamp_custom('%Y-%m-%d %H:%M', true) }}
          {% endif %}
      - name: "Nedorachio zone 5 next run local"
        state: >-
          {% set ts = as_timestamp(states('sensor.nedorachio_zone_5_next_run'), default=0) | int(0) %}
          {% if ts <= 0 %}
