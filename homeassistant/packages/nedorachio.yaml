sensor:
  - platform: statistics
    name: "Nedorachio zone 1 gallons 7d rolling"
    unique_id: nedorachio_zone_1_gallons_7d_rolling_v1
    entity_id: sensor.nedorachio_zone_1_gallons_lifetime
    state_characteristic: change
    max_age:
      days: 7
    sampling_size: 9999
    precision: 1
    unit_of_measurement: gal
  - platform: statistics
    name: "Nedorachio zone 2 gallons 7d rolling"
