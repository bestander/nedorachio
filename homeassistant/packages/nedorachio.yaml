          {% else %}
            {{ ts | timestamp_custom('%Y-%m-%d %H:%M', true) }}
          {% endif %}
      - name: "Nedorachio zone 6 next run local"
        state: >-
          {% set ts = as_timestamp(states('sensor.nedorachio_zone_6_next_run'), default=0) | int(0) %}
          {% if ts <= 0 %}
            unknown
          {% else %}
            {{ ts | timestamp_custom('%Y-%m-%d %H:%M', true) }}
          {% endif %}
      - name: "Nedorachio zone 7 next run local"
        state: >-
          {% set ts = as_timestamp(states('sensor.nedorachio_zone_7_next_run'), default=0) | int(0) %}
          {% if ts <= 0 %}
            unknown
          {% else %}
            {{ ts | timestamp_custom('%Y-%m-%d %H:%M', true) }}
          {% endif %}
      - name: "Nedorachio zone 8 next run local"
        state: >-
          {% set ts = as_timestamp(states('sensor.nedorachio_zone_8_next_run'), default=0) | int(0) %}
          {% if ts <= 0 %}
            unknown
          {% else %}
            {{ ts | timestamp_custom('%Y-%m-%d %H:%M', true) }}
          {% endif %}
      - name: "Nedorachio zone 1 last triggered ago"
        state: >-
          {% set ts = states('sensor.nedorachio_irrigation_controller_zone_1_last_finished_epoch') | int(0) %}
          {% if ts <= 0 %}
            unknown
          {% else %}
            {% set delta = (as_timestamp(now()) - ts) | int(0) %}
            {% if delta < 60 %}
              {{ delta }}s
            {% elif delta < 3600 %}
              {{ (delta // 60) }}m
            {% elif delta < 86400 %}
              {{ (delta // 3600) }}h {{ ((delta % 3600) // 60) }}m
            {% else %}
              {{ (delta // 86400) }}d {{ ((delta % 86400) // 3600) }}h
            {% endif %}
          {% endif %}
