          {% set ts = states('sensor.nedorachio_irrigation_controller_zone_1_last_finished_epoch') | int(0) %}
          {% if ts <= 0 %}
            unknown
          {% else %}
            {% set delta = (as_timestamp(now()) - ts) | int(0) %}
            {% if delta < 60 %}
              {{ delta }}s
            {% elif delta < 3600 %}
              {{ (delta // 60) }}m
            {% elif delta < 86400 %}
              {{ (delta // 3600) }}h {{ ((delta % 3600) // 60) }}m
