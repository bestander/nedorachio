# Nedorachio — Home Assistant package.
#
# Copy into packages/ (only two files):
#   nedorachio.yaml
#   nedorachio-dashboard.yaml
#
# Irrigation config lives in firmware/packages/11-config-profile.yaml (edit before flash).
# Zone last-watering times are input_text helpers (epoch seconds). The ESP reads them
# on connect and writes them back after watering.
#
# Per-zone gallons totals are accumulated on the controller from the flow meter.
# HA keeps monotonic lifetime totals in input_number helpers (survives controller reflash).
# Template sensors expose lifetime and compute weekly progress from lifetime − week baseline.
#
# Rain credit: calendar-week rain (Monday reset) reduces each zone's weekly gallon target.
# Default ratio: 10 mm observed this week → 100 gal credit per zone (globally configurable).
# Expects sensor.openweathermap_rain_intensity (falls back to sensor.openweathermap_rain).
#
# Requires: homeassistant: packages: !include_dir_named packages

