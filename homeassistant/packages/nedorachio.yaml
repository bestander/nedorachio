          {{ [0, target - states('sensor.nedorachio_zone_7_weekly_delivered') | float(0)] | max | round(1) }}
      - name: "Nedorachio zone 8 weekly delivered"
        unique_id: nedorachio_zone_8_weekly_delivered_v1
        unit_of_measurement: gal
        availability: >-
          {% set lifetime = states('input_number.nedorachio_zone_8_gallons_lifetime') | float(-1) %}
          {% set baseline = states('input_number.nedorachio_zone_8_week_baseline_gallons') | float(-1) %}
          {% set last = states('input_number.nedorachio_zone_8_weekly_delivered_last') | float(-1) %}
          {{ lifetime >= 0 and baseline >= 0 and (
               lifetime >= baseline or (last > 0 and baseline > 0 and lifetime < baseline)
             ) }}
        state: >-
          {% set lifetime = states('input_number.nedorachio_zone_8_gallons_lifetime') | float(0) %}
          {% set baseline = states('input_number.nedorachio_zone_8_week_baseline_gallons') | float(0) %}
          {% set last = states('input_number.nedorachio_zone_8_weekly_delivered_last') | float(0) %}
          {% if lifetime >= baseline %}
            {{ [0, lifetime - baseline] | max | round(1) }}
          {% else %}
            {{ last | round(1) }}
          {% endif %}
      - name: "Nedorachio zone 8 weekly remaining"
        unique_id: nedorachio_zone_8_weekly_remaining_v1
        unit_of_measurement: gal
        availability: >-
          {{ states('sensor.nedorachio_irrigation_controller_zone_8_weekly_goal_gallons') not in ['unknown','unavailable','none', None]
             and states('sensor.nedorachio_zone_8_weekly_delivered') not in ['unknown','unavailable','none', None]
             and states('sensor.nedorachio_rain_credit_gallons_per_zone') not in ['unknown','unavailable','none', None] }}
        state: >-
          {% set target = [0, states('sensor.nedorachio_irrigation_controller_zone_8_weekly_goal_gallons') | float(0)
            - states('sensor.nedorachio_rain_credit_gallons_per_zone') | float(0)] | max %}
          {{ [0, target - states('sensor.nedorachio_zone_8_weekly_delivered') | float(0)] | max | round(1) }}

