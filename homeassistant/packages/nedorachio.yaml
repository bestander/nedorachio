template:
  - sensor:
      - name: "Nedorachio rain intensity input"
        unique_id: nedorachio_rain_intensity_input_v1
        unit_of_measurement: mm/h
        state: >-
          {% set preferred = 'sensor.openweathermap_rain_intensity' %}
          {% set fallback = 'sensor.openweathermap_rain' %}
          {% if states(preferred) not in ['unknown','unavailable','none', None] %}
            {{ states(preferred) | float(0) }}
          {% elif states(fallback) not in ['unknown','unavailable','none', None] %}
            {{ states(fallback) | float(0) }}
          {% else %}
            0
          {% endif %}
      - name: "Nedorachio rain observed week"
        unique_id: nedorachio_rain_observed_week_v1
        unit_of_measurement: mm
        state: >-
          {% set lifetime_id = 'input_number.nedorachio_rain_lifetime_mm' %}
          {% set baseline_id = 'input_number.nedorachio_rain_week_baseline_mm' %}
          {% if states(lifetime_id) in ['unknown','unavailable','none', None] or states(baseline_id) in ['unknown','unavailable','none', None] %}
            0
          {% else %}
            {{ [0, states(lifetime_id) | float(0) - states(baseline_id) | float(0)] | max | round(1) }}
          {% endif %}
      - name: "Nedorachio rain credit gallons per zone"
        unique_id: nedorachio_rain_credit_gallons_per_zone_v1
        unit_of_measurement: gal
        state: >-
          {% set rain_id = 'sensor.nedorachio_rain_observed_week' %}
          {% set mm_step_id = 'input_number.nedorachio_rain_credit_mm_per_step' %}
          {% set gal_step_id = 'input_number.nedorachio_rain_credit_gallons_per_zone_per_step' %}
          {% if states(rain_id) in ['unknown','unavailable','none', None] %}
            0
          {% else %}
            {% set mm_step = states(mm_step_id) | float(10) %}
            {% set gal_step = states(gal_step_id) | float(100) %}
            {% if mm_step <= 0 %}0{% else %}{{ (states(rain_id) | float(0) * gal_step / mm_step) | round(1) }}{% endif %}
          {% endif %}
      - name: "Nedorachio zone 1 last watering epoch"
        unique_id: nedorachio_zone_1_last_watering_epoch_v1
        state: >-
          {% set raw = states('input_text.nedorachio_zone_1_last_watering') %}
          {% if raw in ['unknown', 'unavailable', 'none', None] %}0{% else %}{{ raw | int(0) }}{% endif %}
      - name: "Nedorachio zone 2 last watering epoch"
        unique_id: nedorachio_zone_2_last_watering_epoch_v1
        state: >-
