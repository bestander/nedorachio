# Nedorachio — Home Assistant package.
#
# Copy into packages/ (only two files):
#   nedorachio.yaml
#   nedorachio-dashboard.yaml
#
# Irrigation config lives in firmware/packages/11-config-profile.yaml (edit before flash).
# Zone last-watering times are input_text helpers (epoch seconds). The ESP reads them
# on connect and writes them back after watering.
#
# Per-zone gallons totals are accumulated on the controller from the flow meter,
# persisted in flash, and exposed as total_increasing sensors. HA mirrors them as
# template sensors and computes rolling 7-day totals via statistics sensors.
#
# Requires: homeassistant: packages: !include_dir_named packages

input_text:
  nedorachio_zone_1_last_watering:
    name: "Nedorachio zone 1 last watering"
    initial: "0"
    pattern: "[0-9]*"
    max: 16
  nedorachio_zone_2_last_watering:
    name: "Nedorachio zone 2 last watering"
    initial: "0"
    pattern: "[0-9]*"
    max: 16
  nedorachio_zone_3_last_watering:
    name: "Nedorachio zone 3 last watering"
    initial: "0"
    pattern: "[0-9]*"
    max: 16
  nedorachio_zone_4_last_watering:
    name: "Nedorachio zone 4 last watering"
    initial: "0"
    pattern: "[0-9]*"
    max: 16
  nedorachio_zone_5_last_watering:
    name: "Nedorachio zone 5 last watering"
    initial: "0"
    pattern: "[0-9]*"
    max: 16
  nedorachio_zone_6_last_watering:
    name: "Nedorachio zone 6 last watering"
    initial: "0"
    pattern: "[0-9]*"
    max: 16
  nedorachio_zone_7_last_watering:
    name: "Nedorachio zone 7 last watering"
    initial: "0"
    pattern: "[0-9]*"
    max: 16
  nedorachio_zone_8_last_watering:
    name: "Nedorachio zone 8 last watering"
    initial: "0"
    pattern: "[0-9]*"
    max: 16

template:
  - sensor:
      - name: "Nedorachio zone 1 last watering epoch"
        unique_id: nedorachio_zone_1_last_watering_epoch_v1
        state: "{{ states('input_text.nedorachio_zone_1_last_watering') | int(0) }}"
      - name: "Nedorachio zone 2 last watering epoch"
        unique_id: nedorachio_zone_2_last_watering_epoch_v1
        state: "{{ states('input_text.nedorachio_zone_2_last_watering') | int(0) }}"
      - name: "Nedorachio zone 3 last watering epoch"
        unique_id: nedorachio_zone_3_last_watering_epoch_v1
        state: "{{ states('input_text.nedorachio_zone_3_last_watering') | int(0) }}"
      - name: "Nedorachio zone 4 last watering epoch"
        unique_id: nedorachio_zone_4_last_watering_epoch_v1
        state: "{{ states('input_text.nedorachio_zone_4_last_watering') | int(0) }}"
      - name: "Nedorachio zone 5 last watering epoch"
        unique_id: nedorachio_zone_5_last_watering_epoch_v1
        state: "{{ states('input_text.nedorachio_zone_5_last_watering') | int(0) }}"
      - name: "Nedorachio zone 6 last watering epoch"
        unique_id: nedorachio_zone_6_last_watering_epoch_v1
        state: "{{ states('input_text.nedorachio_zone_6_last_watering') | int(0) }}"
      - name: "Nedorachio zone 7 last watering epoch"
        unique_id: nedorachio_zone_7_last_watering_epoch_v1
        state: "{{ states('input_text.nedorachio_zone_7_last_watering') | int(0) }}"
      - name: "Nedorachio zone 8 last watering epoch"
        unique_id: nedorachio_zone_8_last_watering_epoch_v1
        state: "{{ states('input_text.nedorachio_zone_8_last_watering') | int(0) }}"
      - name: "Nedorachio zone 1 last watered"
        state: >-
          {% set e = states('input_text.nedorachio_zone_1_last_watering') | int(0) %}
          {% if e > 0 %}{{ e | timestamp_custom('%Y-%m-%d %H:%M', true) }}{% else %}never{% endif %}
      - name: "Nedorachio zone 2 last watered"
        state: >-
          {% set e = states('input_text.nedorachio_zone_2_last_watering') | int(0) %}
          {% if e > 0 %}{{ e | timestamp_custom('%Y-%m-%d %H:%M', true) }}{% else %}never{% endif %}
      - name: "Nedorachio zone 3 last watered"
        state: >-
          {% set e = states('input_text.nedorachio_zone_3_last_watering') | int(0) %}
          {% if e > 0 %}{{ e | timestamp_custom('%Y-%m-%d %H:%M', true) }}{% else %}never{% endif %}
      - name: "Nedorachio zone 4 last watered"
        state: >-
          {% set e = states('input_text.nedorachio_zone_4_last_watering') | int(0) %}
          {% if e > 0 %}{{ e | timestamp_custom('%Y-%m-%d %H:%M', true) }}{% else %}never{% endif %}
      - name: "Nedorachio zone 5 last watered"
        state: >-
          {% set e = states('input_text.nedorachio_zone_5_last_watering') | int(0) %}
          {% if e > 0 %}{{ e | timestamp_custom('%Y-%m-%d %H:%M', true) }}{% else %}never{% endif %}
      - name: "Nedorachio zone 6 last watered"
        state: >-
          {% set e = states('input_text.nedorachio_zone_6_last_watering') | int(0) %}
          {% if e > 0 %}{{ e | timestamp_custom('%Y-%m-%d %H:%M', true) }}{% else %}never{% endif %}
      - name: "Nedorachio zone 7 last watered"
        state: >-
          {% set e = states('input_text.nedorachio_zone_7_last_watering') | int(0) %}
          {% if e > 0 %}{{ e | timestamp_custom('%Y-%m-%d %H:%M', true) }}{% else %}never{% endif %}
      - name: "Nedorachio zone 8 last watered"
        state: >-
          {% set e = states('input_text.nedorachio_zone_8_last_watering') | int(0) %}
          {% if e > 0 %}{{ e | timestamp_custom('%Y-%m-%d %H:%M', true) }}{% else %}never{% endif %}
      - name: "Nedorachio last stop reason"
        state: >-
          {% set outcome = states('text.nedorachio_irrigation_controller_last_run_outcome') %}
          {% if outcome.startswith('cancelled_') %}
            {{ outcome | replace('cancelled_', '') }}
          {% else %}
            none
          {% endif %}
      - name: "Nedorachio last stop flow/pressure fault"
        state: >-
          {% set reason = states('sensor.nedorachio_last_stop_reason') %}
          {% if reason in ['no_flow', 'high_flow', 'low_pressure', 'high_pressure'] %}
            yes
          {% else %}
            no
          {% endif %}
      - name: "Nedorachio zone 1 next run"
        device_class: timestamp
        state: >-
          {% set e = states('sensor.nedorachio_irrigation_controller_zone_1_scheduled_next_start_epoch') %}
          {% if e in ['unknown', 'unavailable', 'none', None] or e | float(default=-1) <= 0 %}
            {{ none }}
          {% else %}
            {{ as_datetime(e | int) }}
          {% endif %}
      - name: "Nedorachio zone 2 next run"
        device_class: timestamp
        state: >-
          {% set e = states('sensor.nedorachio_irrigation_controller_zone_2_scheduled_next_start_epoch') %}
          {% if e in ['unknown', 'unavailable', 'none', None] or e | float(default=-1) <= 0 %}
