template:
  - sensor:
      - name: "Nedorachio config profile"
        state: "ready"
        attributes:
          profile:
            version: 1
            global:
              watering_window:
                start: "23:00"
                end: "09:00"
                timezone: "America/New_York"
              rain_accumulation_threshold_mm_48h: 5
              rain_accumulation_hold_hours_after_threshold: 24
              attempt_cooldown_minutes: 20
              maximum_runtime_minutes: 60
              blackout:
                weekdays: []
            zones:
              "1":
                enabled: true
                mode: gallons_target
                goal_gallons_per_cycle: 100
                cycle_gallons: 50
                soak_minutes: 15
                minimum_interval_hours: 72
                start_minimum_psi: 35
                start_maximum_psi: 85
                minimum_running_psi: 20
                minimum_running_psi_grace_seconds: 600
                minimum_flow_gpm: 0.2
                maximum_flow_gpm: 12.0
              "2":
                enabled: true
                mode: gallons_target
