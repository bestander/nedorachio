# Lovelace view for Nedorachio.
# Paste into the dashboard editor: Settings → Dashboards → Open dashboard →
# ⋮ → Edit Dashboard → ⋮ → Raw configuration editor → append under `views:`.

title: Nedorachio
icon: mdi:sprinkler
path: nedorachio
cards:
  - type: entities
    title: Nedorachio controls
    state_color: true
    entities:
      - entity: sensor.nedorachio_irrigation_controller_pressure
        name: Pressure (PSI)
      - entity: sensor.nedorachio_irrigation_controller_flow_rate
        name: Flow rate (GPM)
      - type: divider
      - entity: switch.nedorachio_irrigation_controller_zone_1
        name: Relay 1 (Zone 1)
        secondary_info: last-changed
      - entity: switch.nedorachio_irrigation_controller_zone_2
        name: Relay 2 (Zone 2)
        secondary_info: last-changed
      - entity: switch.nedorachio_irrigation_controller_zone_3
        name: Relay 3 (Zone 3)
        secondary_info: last-changed
      - entity: switch.nedorachio_irrigation_controller_zone_4
        name: Relay 4 (Zone 4)
        secondary_info: last-changed
      - type: divider
      - entity: switch.nedorachio_irrigation_controller_master_enable
        name: Master enable
      - entity: switch.nedorachio_irrigation_controller_fallback_schedule_enabled
        name: Fallback schedule
      - entity: button.nedorachio_irrigation_controller_emergency_stop_all
        name: Emergency stop
      - entity: button.nedorachio_irrigation_controller_skip_next_run
        name: Skip next run
      - entity: button.nedorachio_irrigation_controller_clear_fault
        name: Clear fault
      - entity: button.nedorachio_irrigation_controller_run_full_cycle
        name: Run full cycle now
