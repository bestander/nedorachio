# HA-authoritative persisted state. Device RAM only — no NVS.
# Home Assistant pushes values on connect via number.set_value; the controller
# publishes live values back through the same entities (lambda + set_action).

number:
  - platform: template
    name: "Zone 1 last finished epoch"
    id: zone_1_last_finished_ha
    optimistic: false
    min_value: 0
    max_value: 4000000000
    step: 1
    update_interval: 15s
    lambda: 'return (float) id(zone_1_last_finished_epoch);'
    set_action:
      - lambda: |-
          // Device owns cadence — ignore HA state-restore pushes (they rewound schedules).
          ESP_LOGD("cadence", "Zone 1: ignored HA last_finished write %u (device has %u)",
                   (uint32_t) x, id(zone_1_last_finished_epoch));
