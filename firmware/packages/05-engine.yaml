# Engine: pre-flight gates, cycle-and-soak, mid-run cancels, retry, sequencing.

globals:
  - id: pre_flight_passed
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: pre_flight_reason
    type: std::string
    restore_value: false
    initial_value: '""'

  # Last time the rain sensor was wet, epoch seconds.
  - id: rain_sensor_last_wet_epoch
    type: uint32_t
    restore_value: true
    initial_value: '0'

  # Last time the rain forecast was over threshold, epoch seconds.
  - id: rain_forecast_last_high_epoch
    type: uint32_t
    restore_value: true
    initial_value: '0'

  # Whether any alarm is latched. Cleared by `clear_fault`.
  - id: any_alarm_latched
    type: bool
    restore_value: true
    initial_value: 'false'

  # --- Per-run state (cycle-and-soak engine) ---
  - id: run_total_min
    type: float
    restore_value: false
    initial_value: '0'
  - id: run_cycle_min
    type: float
    restore_value: false
    initial_value: '0'
  - id: run_soak_min
    type: float
    restore_value: false
    initial_value: '0'
  - id: run_zone_id
    type: int
    restore_value: false
    initial_value: '0'
  - id: run_minutes_done
    type: float
    restore_value: false
    initial_value: '0'
  - id: run_cancel_requested
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: run_cancel_cause
    type: std::string
    restore_value: false
    initial_value: '""'
  - id: retries_used_this_zone
    type: int
    restore_value: false
    initial_value: '0'
  - id: run_phase_seconds_left
    type: int
    restore_value: false
    initial_value: '0'

  # --- Full-cycle iteration state ---
  - id: cycle_zone_cursor
    type: int
    restore_value: false
    initial_value: '0'
  - id: staged_total_min
    type: float
    restore_value: false
    initial_value: '0'
  - id: staged_cycle_min
    type: float
    restore_value: false
    initial_value: '0'
  - id: staged_soak_min
    type: float
    restore_value: false
    initial_value: '0'

binary_sensor:
  - platform: template
    name: "Alarm: pre-flight failed"
    id: alarm_pre_flight_failed
    device_class: problem
  - platform: template
    name: "Alarm: no flow"
    id: alarm_no_flow
    device_class: problem
  - platform: template
    name: "Alarm: high flow"
    id: alarm_high_flow
    device_class: problem
  - platform: template
    name: "Alarm: phantom flow"
    id: alarm_phantom_flow
    device_class: problem
  - platform: template
    name: "Alarm: low pressure"
    id: alarm_low_pressure
    device_class: problem
  - platform: template
    name: "Alarm: high pressure"
    id: alarm_high_pressure
    device_class: problem

button:
  - platform: template
    name: "Clear fault"
    id: clear_fault
    on_press:
      - lambda: |-
          id(any_alarm_latched) = false;
      - binary_sensor.template.publish: { id: alarm_pre_flight_failed, state: false }
      - binary_sensor.template.publish: { id: alarm_runtime_exceeded, state: false }
      - binary_sensor.template.publish: { id: alarm_no_flow, state: false }
      - binary_sensor.template.publish: { id: alarm_high_flow, state: false }
      - binary_sensor.template.publish: { id: alarm_phantom_flow, state: false }
      - binary_sensor.template.publish: { id: alarm_low_pressure, state: false }
      - binary_sensor.template.publish: { id: alarm_high_pressure, state: false }

  - platform: template
    name: "Run now zone 1"
    id: run_now_zone_1
    on_press:
      - script.execute:
          id: run_one_zone_with_retry
          zone_id: 1
          total_min: !lambda 'return id(zone_1_total_min).state;'
          cycle_min: !lambda 'return id(zone_1_cycle_min).state;'
          soak_min: !lambda 'return id(zone_1_soak_min).state;'
  - platform: template
    name: "Run now zone 2"
    id: run_now_zone_2
    on_press:
      - script.execute:
