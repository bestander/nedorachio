          zone_id: 2
          total_min: !lambda 'return id(zone_2_total_min).state;'
          cycle_min: !lambda 'return id(zone_2_cycle_min).state;'
          soak_min: !lambda 'return id(zone_2_soak_min).state;'
  - platform: template
    name: "Run now zone 3"
    id: run_now_zone_3
    on_press:
      - script.execute:
          id: run_one_zone_with_retry
          zone_id: 3
          total_min: !lambda 'return id(zone_3_total_min).state;'
          cycle_min: !lambda 'return id(zone_3_cycle_min).state;'
          soak_min: !lambda 'return id(zone_3_soak_min).state;'
  - platform: template
    name: "Run now zone 4"
    id: run_now_zone_4
    on_press:
      - script.execute:
          id: run_one_zone_with_retry
          zone_id: 4
          total_min: !lambda 'return id(zone_4_total_min).state;'
          cycle_min: !lambda 'return id(zone_4_cycle_min).state;'
          soak_min: !lambda 'return id(zone_4_soak_min).state;'
  - platform: template
    name: "Run now zone 5"
    id: run_now_zone_5
    on_press:
      - script.execute:
          id: run_one_zone_with_retry
          zone_id: 5
          total_min: !lambda 'return id(zone_5_total_min).state;'
          cycle_min: !lambda 'return id(zone_5_cycle_min).state;'
          soak_min: !lambda 'return id(zone_5_soak_min).state;'
  - platform: template
    name: "Run now zone 6"
    id: run_now_zone_6
    on_press:
      - script.execute:
          id: run_one_zone_with_retry
          zone_id: 6
          total_min: !lambda 'return id(zone_6_total_min).state;'
          cycle_min: !lambda 'return id(zone_6_cycle_min).state;'
          soak_min: !lambda 'return id(zone_6_soak_min).state;'
  - platform: template
    name: "Run now zone 7"
    id: run_now_zone_7
    on_press:
      - script.execute:
          id: run_one_zone_with_retry
          zone_id: 7
          total_min: !lambda 'return id(zone_7_total_min).state;'
          cycle_min: !lambda 'return id(zone_7_cycle_min).state;'
          soak_min: !lambda 'return id(zone_7_soak_min).state;'
  - platform: template
    name: "Run now zone 8"
    id: run_now_zone_8
    on_press:
      - script.execute:
          id: run_one_zone_with_retry
          zone_id: 8
          total_min: !lambda 'return id(zone_8_total_min).state;'
          cycle_min: !lambda 'return id(zone_8_cycle_min).state;'
