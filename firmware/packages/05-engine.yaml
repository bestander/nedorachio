script:
  - id: clear_recoverable_alarms
    mode: single
    then:
      - binary_sensor.template.publish: { id: alarm_pre_flight_failed, state: false }
      - binary_sensor.template.publish: { id: alarm_runtime_exceeded, state: false }
      - binary_sensor.template.publish: { id: alarm_no_flow, state: false }
      - binary_sensor.template.publish: { id: alarm_high_flow, state: false }
      - binary_sensor.template.publish: { id: alarm_low_pressure, state: false }
      - binary_sensor.template.publish: { id: alarm_high_pressure, state: false }
      - lambda: |-
          // Only phantom flow requires manual clear; recoverable cancels retry via cooldown.
          if (!id(alarm_phantom_flow).state) {
            id(any_alarm_latched) = false;
          }

  - id: clear_all_faults
    mode: single
    then:
      - lambda: |-
          id(any_alarm_latched) = false;
      - binary_sensor.template.publish: { id: alarm_pre_flight_failed, state: false }
      - binary_sensor.template.publish: { id: alarm_runtime_exceeded, state: false }
      - binary_sensor.template.publish: { id: alarm_no_flow, state: false }
      - binary_sensor.template.publish: { id: alarm_high_flow, state: false }
      - binary_sensor.template.publish: { id: alarm_phantom_flow, state: false }
      - binary_sensor.template.publish: { id: alarm_low_pressure, state: false }
      - binary_sensor.template.publish: { id: alarm_high_pressure, state: false }

  - id: run_pre_flight
    mode: single
    parameters:
      is_schedule: bool   # true = called from the fallback schedule (extra gates apply)
    then:
      - lambda: |-
          id(pre_flight_passed) = true;
          id(pre_flight_reason) = "";
      # 1. master_enable
      - if:
          condition:
            switch.is_off: master_enable
          then:
            - lambda: |-
                id(pre_flight_passed) = false;
                id(pre_flight_reason) = "master_enable_off";
      # 2. emergency stop latched
      - if:
          condition:
            switch.is_on: emergency_stop_latched
          then:
            - lambda: |-
                id(pre_flight_passed) = false;
                id(pre_flight_reason) = "emergency_stop_latched";
      # 3. time_synced
      - if:
          condition:
            binary_sensor.is_off: time_synced
          then:
            - lambda: |-
                id(pre_flight_passed) = false;
                id(pre_flight_reason) = "time_not_synced";
      # 4. rain sensor dry + hold
      - lambda: |-
          if (id(gate_rain_sensor).state) {
            if (id(rain_sensor).state) {
              id(pre_flight_passed) = false;
              id(pre_flight_reason) = "rain_sensor_wet";
            } else {
              uint32_t now_epoch = (uint32_t)id(effective_now_epoch).state;
              uint32_t hold_s = (uint32_t)(id(rain_hold_hours_after_sensor).state * 3600.0f);
              if (id(rain_sensor_last_wet_epoch) > 0 &&
                  now_epoch - id(rain_sensor_last_wet_epoch) < hold_s) {
                id(pre_flight_passed) = false;
                id(pre_flight_reason) = "rain_hold_after_sensor";
              }
            }
          }
      # 5. rain forecast (with TTL → fail-open if stale)
      - lambda: |-
          uint32_t now_epoch = (uint32_t)id(effective_now_epoch).state;
          uint32_t ttl_s = (uint32_t)(id(rain_mm_max_age_hours).state * 3600.0f);
          float effective_mm = id(rain_mm_last_48h).state;
          uint32_t pushed = (uint32_t)id(rain_mm_last_pushed_epoch).state;
          if (pushed == 0 || now_epoch - pushed > ttl_s) {
            effective_mm = 0.0f;   // stale → fail-open
          }
          if (effective_mm > id(rain_mm_threshold_48h).state) {
            id(pre_flight_passed) = false;
            id(pre_flight_reason) = "rain_forecast_high";
            id(rain_forecast_last_high_epoch) = now_epoch;
          } else {
            uint32_t hold_s = (uint32_t)(id(rain_hold_hours_after_forecast).state * 3600.0f);
            if (id(rain_forecast_last_high_epoch) > 0 &&
                now_epoch - id(rain_forecast_last_high_epoch) < hold_s) {
              id(pre_flight_passed) = false;
              id(pre_flight_reason) = "rain_forecast_hold";
            }
          }
      # 6. static-pressure gate (only meaningful when no zone is on)
      - if:
          condition:
            lambda: 'return id(currently_on_zone) == 0 && id(gate_static_pressure_preflight).state;'
          then:
            - delay: 1s   # let any noise settle
            - lambda: |-
                float p = id(pressure_psi).state;
                if (p < id(pressure_static_min_psi).state) {
                  id(pre_flight_passed) = false;
                  id(pre_flight_reason) = "pressure_too_low";
                } else if (p > id(pressure_static_max_psi).state) {
                  id(pre_flight_passed) = false;
                  id(pre_flight_reason) = "pressure_too_high";
                }
      # 7. schedule-only gate: fallback_schedule_enabled
      - if:
          condition:
            and:
              - lambda: 'return is_schedule;'
              - switch.is_off: fallback_schedule_enabled
          then:
            - lambda: |-
                id(pre_flight_passed) = false;
                id(pre_flight_reason) = "schedule_disabled";
      # 8. no alarm latched
      - if:
          condition:
            lambda: 'return id(any_alarm_latched);'
          then:
            - lambda: |-
                id(pre_flight_passed) = false;
                id(pre_flight_reason) = "alarm_latched";
      # publish the alarm if failed
      - if:
          condition:
            lambda: 'return !id(pre_flight_passed);'
          then:
            - lambda: |-
                // Rain/weather/pressure blocks are expected schedule skips, not faults.
                bool benign_skip =
                    id(pre_flight_reason) == "rain_sensor_wet" ||
                    id(pre_flight_reason) == "rain_hold_after_sensor" ||
                    id(pre_flight_reason) == "rain_forecast_high" ||
                    id(pre_flight_reason) == "rain_forecast_hold" ||
                    id(pre_flight_reason) == "pressure_too_low" ||
                    id(pre_flight_reason) == "pressure_too_high" ||
                    id(pre_flight_reason) == "alarm_latched";
                if (benign_skip) {
                  ESP_LOGI("preflight", "SKIP: %s", id(pre_flight_reason).c_str());
                } else {
                  id(alarm_pre_flight_failed).publish_state(true);
                  ESP_LOGW("preflight", "FAIL: %s", id(pre_flight_reason).c_str());
                }
          else:
            - binary_sensor.template.publish: { id: alarm_pre_flight_failed, state: false }
            - lambda: |-
                ESP_LOGI("preflight", "PASS");

  - id: run_one_zone
    mode: single
    parameters:
      zone_id: int
      total_min: float
      cycle_min: float
      soak_min: float
    then:
      - lambda: |-
          id(run_zone_id) = zone_id;
          id(run_total_min) = total_min;
          id(run_cycle_min) = cycle_min;
          id(run_soak_min) = soak_min;
          id(run_minutes_done) = 0.0f;
          id(run_cancel_requested) = false;
          id(run_cancel_cause) = "";
          id(retries_used_this_zone) = 0;
          id(stamp_cadence_on_zone_off) = true;
          id(zone_run_started_pulses) = (uint32_t)id(flow_pulses_total).state;
          id(zone_run_started_ms) = millis();
          float start_min_psi = 0.0f;
          float start_max_psi = 999.0f;
          switch (zone_id) {
            case 1: start_min_psi = id(zone_1_start_minimum_psi).state; start_max_psi = id(zone_1_start_maximum_psi).state; break;
            case 2: start_min_psi = id(zone_2_start_minimum_psi).state; start_max_psi = id(zone_2_start_maximum_psi).state; break;
            case 3: start_min_psi = id(zone_3_start_minimum_psi).state; start_max_psi = id(zone_3_start_maximum_psi).state; break;
            case 4: start_min_psi = id(zone_4_start_minimum_psi).state; start_max_psi = id(zone_4_start_maximum_psi).state; break;
            case 5: start_min_psi = id(zone_5_start_minimum_psi).state; start_max_psi = id(zone_5_start_maximum_psi).state; break;
            case 6: start_min_psi = id(zone_6_start_minimum_psi).state; start_max_psi = id(zone_6_start_maximum_psi).state; break;
            case 7: start_min_psi = id(zone_7_start_minimum_psi).state; start_max_psi = id(zone_7_start_maximum_psi).state; break;
            case 8: start_min_psi = id(zone_8_start_minimum_psi).state; start_max_psi = id(zone_8_start_maximum_psi).state; break;
          }
          float p = id(pressure_psi).state;
          if (p < start_min_psi || p > start_max_psi) {
            id(run_cancel_requested) = true;
            id(run_cancel_cause) = "start_pressure_out_of_bounds";
          }
      - while:
          condition:
            lambda: |-
              return id(run_minutes_done) < id(run_total_min)
                  && !id(run_cancel_requested);
          then:
            # ---- RUNNING phase ----
            - lambda: |-
                id(current_phase_str) = "running";
                id(phase_started_ms) = millis();
                id(phase_total_ms) = (uint32_t)(id(run_cycle_min) * 60000.0f);
            - script.execute:
                id: drive_zone
                zone_id: !lambda 'return id(run_zone_id);'
                state: !lambda 'return true;'
            - lambda: |-
                ESP_LOGI("engine", "Zone %d running for %.1f min (done %.1f / %.1f)",
                  id(run_zone_id), id(run_cycle_min),
                  id(run_minutes_done), id(run_total_min));
            - lambda: |-
                id(run_phase_seconds_left) = (int)(id(run_cycle_min) * 60.0f);
            # Tick once per second; exit early on cancel so the post-while
            # cleanup (drive_zone OFF + log) still runs.
            - while:
                condition:
                  lambda: |-
                    return id(run_phase_seconds_left) > 0
                        && !id(run_cancel_requested);
                then:
                  - delay: 1s
                  - lambda: |-
                      id(run_phase_seconds_left) -= 1;
                      id(run_minutes_done) += 1.0f / 60.0f;
            # ---- SOAK phase (skip if total reached or cancelled) ----
            - if:
                condition:
                  lambda: |-
                    return id(run_minutes_done) < id(run_total_min) &&
                           id(run_soak_min) > 0 &&
                           !id(run_cancel_requested);
                then:
                  - lambda: |-
                      id(current_phase_str) = "soaking";
                      id(phase_started_ms) = millis();
                      id(phase_total_ms) = (uint32_t)(id(run_soak_min) * 60000.0f);
                      id(stamp_cadence_on_zone_off) = false;
                  - script.execute:
                      id: drive_zone
                      zone_id: !lambda 'return id(run_zone_id);'
                      state: !lambda 'return false;'
                  - lambda: |-
                      ESP_LOGI("engine", "Zone %d soaking for %.1f min", id(run_zone_id), id(run_soak_min));
                  - delay: !lambda 'return (uint32_t)(id(run_soak_min) * 60.0f * 1000.0f);'
      # ---- finally ----
      - lambda: |-
          id(stamp_cadence_on_zone_off) = !id(run_cancel_requested);
      - script.execute:
          id: drive_zone
          zone_id: !lambda 'return id(run_zone_id);'
          state: !lambda 'return false;'
      - if:
          condition:
            lambda: 'return !id(run_cancel_requested);'
          then:
            - script.execute:
                id: stamp_zone_last_finished
                zone_id: !lambda 'return id(run_zone_id);'
      - lambda: |-
          if (id(run_cancel_requested)) {
            ESP_LOGW("engine", "Zone %d cancelled (cause: %s, %.1f / %.1f min done)",
              id(run_zone_id), id(run_cancel_cause).c_str(),
              id(run_minutes_done), id(run_total_min));
          } else {
            ESP_LOGI("engine", "Zone %d completed (%.1f min)", id(run_zone_id), id(run_minutes_done));
          }

          // Accumulate stats: gallons (from pulses), duration, last-run timestamp.
          uint32_t end_pulses = (uint32_t)id(flow_pulses_total).state;
          uint32_t pulses = (end_pulses >= id(zone_run_started_pulses))
              ? end_pulses - id(zone_run_started_pulses) : 0;
          float ppg = id(pulses_per_gallon).state;
          float gallons = (ppg > 0) ? (pulses / ppg) : 0.0f;
          uint32_t duration_s = (millis() - id(zone_run_started_ms)) / 1000;
          uint32_t now_epoch = id(time_synced).state ? (uint32_t)id(effective_now_epoch).state : 0;

          switch (id(run_zone_id)) {
            case 1:
              id(zone_1_run_count_total) += 1;
              id(zone_1_gallons_total) += gallons;
              id(zone_1_seconds_total) += duration_s;
              id(zone_1_last_gallons) = gallons;
              id(zone_1_last_duration_s) = duration_s;
              if (now_epoch) id(zone_1_last_run_at) = now_epoch;
              break;
            case 2:
              id(zone_2_run_count_total) += 1;
              id(zone_2_gallons_total) += gallons;
              id(zone_2_seconds_total) += duration_s;
              id(zone_2_last_gallons) = gallons;
              id(zone_2_last_duration_s) = duration_s;
              if (now_epoch) id(zone_2_last_run_at) = now_epoch;
              break;
            case 3:
              id(zone_3_run_count_total) += 1;
              id(zone_3_gallons_total) += gallons;
              id(zone_3_seconds_total) += duration_s;
              id(zone_3_last_gallons) = gallons;
              id(zone_3_last_duration_s) = duration_s;
              if (now_epoch) id(zone_3_last_run_at) = now_epoch;
              break;
            case 4:
              id(zone_4_run_count_total) += 1;
              id(zone_4_gallons_total) += gallons;
              id(zone_4_seconds_total) += duration_s;
              id(zone_4_last_gallons) = gallons;
              id(zone_4_last_duration_s) = duration_s;
              if (now_epoch) id(zone_4_last_run_at) = now_epoch;
              break;
            case 5:
              id(zone_5_run_count_total) += 1;
              id(zone_5_gallons_total) += gallons;
              id(zone_5_seconds_total) += duration_s;
              id(zone_5_last_gallons) = gallons;
              id(zone_5_last_duration_s) = duration_s;
              if (now_epoch) id(zone_5_last_run_at) = now_epoch;
              break;
            case 6:
              id(zone_6_run_count_total) += 1;
              id(zone_6_gallons_total) += gallons;
              id(zone_6_seconds_total) += duration_s;
              id(zone_6_last_gallons) = gallons;
              id(zone_6_last_duration_s) = duration_s;
              if (now_epoch) id(zone_6_last_run_at) = now_epoch;
              break;
            case 7:
              id(zone_7_run_count_total) += 1;
              id(zone_7_gallons_total) += gallons;
              id(zone_7_seconds_total) += duration_s;
              id(zone_7_last_gallons) = gallons;
              id(zone_7_last_duration_s) = duration_s;
              if (now_epoch) id(zone_7_last_run_at) = now_epoch;
              break;
            case 8:
              id(zone_8_run_count_total) += 1;
              id(zone_8_gallons_total) += gallons;
              id(zone_8_seconds_total) += duration_s;
              id(zone_8_last_gallons) = gallons;
              id(zone_8_last_duration_s) = duration_s;
              if (now_epoch) id(zone_8_last_run_at) = now_epoch;
              break;
          }
          id(gallons_today) += gallons;
          id(gallons_this_month) += gallons;
          id(runs_today) += 1;
          id(runs_this_month) += 1;

  - id: run_one_zone_gallons_target
    mode: single
    parameters:
      zone_id: int
      goal_gallons: float
      cycle_gallons: float
      soak_min: float
    then:
      - lambda: |-
          id(run_zone_id) = zone_id;
          id(run_total_min) = 0.0f;
          id(run_cycle_min) = 0.0f;
          id(run_soak_min) = soak_min;
          id(run_goal_gallons) = goal_gallons;
          id(run_cycle_gallons) = cycle_gallons;
          id(run_minutes_done) = 0.0f;
          id(run_cancel_requested) = false;
          id(run_cancel_cause) = "";
          id(retries_used_this_zone) = 0;
          id(stamp_cadence_on_zone_off) = true;
          id(zone_run_started_pulses) = (uint32_t)id(flow_pulses_total).state;
          id(zone_run_started_ms) = millis();
          switch (zone_id) {
            case 1: id(run_gallons_done) = id(zone_1_cycle_delivered_gallons); break;
            case 2: id(run_gallons_done) = id(zone_2_cycle_delivered_gallons); break;
            case 3: id(run_gallons_done) = id(zone_3_cycle_delivered_gallons); break;
            case 4: id(run_gallons_done) = id(zone_4_cycle_delivered_gallons); break;
            case 5: id(run_gallons_done) = id(zone_5_cycle_delivered_gallons); break;
            case 6: id(run_gallons_done) = id(zone_6_cycle_delivered_gallons); break;
            case 7: id(run_gallons_done) = id(zone_7_cycle_delivered_gallons); break;
            case 8: id(run_gallons_done) = id(zone_8_cycle_delivered_gallons); break;
          }
          id(run_base_gallons) = id(run_gallons_done);
          float start_min_psi = 0.0f;
          float start_max_psi = 999.0f;
          switch (zone_id) {
            case 1: start_min_psi = id(zone_1_start_minimum_psi).state; start_max_psi = id(zone_1_start_maximum_psi).state; break;
            case 2: start_min_psi = id(zone_2_start_minimum_psi).state; start_max_psi = id(zone_2_start_maximum_psi).state; break;
            case 3: start_min_psi = id(zone_3_start_minimum_psi).state; start_max_psi = id(zone_3_start_maximum_psi).state; break;
            case 4: start_min_psi = id(zone_4_start_minimum_psi).state; start_max_psi = id(zone_4_start_maximum_psi).state; break;
            case 5: start_min_psi = id(zone_5_start_minimum_psi).state; start_max_psi = id(zone_5_start_maximum_psi).state; break;
            case 6: start_min_psi = id(zone_6_start_minimum_psi).state; start_max_psi = id(zone_6_start_maximum_psi).state; break;
            case 7: start_min_psi = id(zone_7_start_minimum_psi).state; start_max_psi = id(zone_7_start_maximum_psi).state; break;
            case 8: start_min_psi = id(zone_8_start_minimum_psi).state; start_max_psi = id(zone_8_start_maximum_psi).state; break;
          }
          float p = id(pressure_psi).state;
          if (p < start_min_psi || p > start_max_psi) {
            id(run_cancel_requested) = true;
            id(run_cancel_cause) = "start_pressure_out_of_bounds";
          }
      - if:
          condition:
            lambda: 'return id(run_gallons_done) >= id(run_goal_gallons);'
          then:
            - logger.log:
                format: "Zone %d already at/above goal (%.2f / %.2f gal); skipping run."
                args: ['id(run_zone_id)', 'id(run_gallons_done)', 'id(run_goal_gallons)']
          else:
            - while:
                condition:
                  lambda: |-
                    return id(run_gallons_done) < id(run_goal_gallons) &&
                           !id(run_cancel_requested);
                then:
                  - lambda: |-
                      id(current_phase_str) = "running";
                      id(phase_started_ms) = millis();
                      id(phase_total_ms) = 0;
                  - script.execute:
                      id: drive_zone
                      zone_id: !lambda 'return id(run_zone_id);'
                      state: !lambda 'return true;'
                  - lambda: |-
                      id(run_chunk_start_pulses) = (uint32_t)id(flow_pulses_total).state;
                  - while:
                      condition:
                        lambda: |-
                          if (id(run_cancel_requested)) return false;
                          if (id(run_gallons_done) >= id(run_goal_gallons)) return false;
                          uint32_t pulses_now = (uint32_t)id(flow_pulses_total).state;
                          uint32_t chunk_pulses = (pulses_now >= id(run_chunk_start_pulses))
                              ? (pulses_now - id(run_chunk_start_pulses)) : 0;
                          float ppg = id(pulses_per_gallon).state;
                          float chunk_gallons_done = (ppg > 0.0f) ? (chunk_pulses / ppg) : 0.0f;
                          float remaining = id(run_goal_gallons) - id(run_gallons_done);
                          if (remaining <= 0.0f) return false;
                          float chunk_limit = id(run_cycle_gallons);
                          if (chunk_limit > remaining) chunk_limit = remaining;
                          return chunk_gallons_done < chunk_limit;
                      then:
                        - delay: 1s
                        - lambda: |-
                            uint32_t pulses_now = (uint32_t)id(flow_pulses_total).state;
                            uint32_t run_pulses = (pulses_now >= id(zone_run_started_pulses))
                                ? (pulses_now - id(zone_run_started_pulses)) : 0;
                            float ppg = id(pulses_per_gallon).state;
                            float run_gallons_delta = (ppg > 0.0f) ? (run_pulses / ppg) : 0.0f;
                            id(run_gallons_done) = id(run_base_gallons) + run_gallons_delta;
                            switch (id(run_zone_id)) {
                              case 1: id(zone_1_cycle_delivered_gallons) = id(run_gallons_done); break;
                              case 2: id(zone_2_cycle_delivered_gallons) = id(run_gallons_done); break;
                              case 3: id(zone_3_cycle_delivered_gallons) = id(run_gallons_done); break;
                              case 4: id(zone_4_cycle_delivered_gallons) = id(run_gallons_done); break;
                              case 5: id(zone_5_cycle_delivered_gallons) = id(run_gallons_done); break;
                              case 6: id(zone_6_cycle_delivered_gallons) = id(run_gallons_done); break;
                              case 7: id(zone_7_cycle_delivered_gallons) = id(run_gallons_done); break;
                              case 8: id(zone_8_cycle_delivered_gallons) = id(run_gallons_done); break;
                            }
                  - lambda: 'id(stamp_cadence_on_zone_off) = false;'
                  - script.execute:
                      id: drive_zone
                      zone_id: !lambda 'return id(run_zone_id);'
                      state: !lambda 'return false;'
                  - if:
                      condition:
                        lambda: 'return id(run_gallons_done) < id(run_goal_gallons) && !id(run_cancel_requested) && id(run_soak_min) > 0;'
                      then:
                        - lambda: |-
                            id(current_phase_str) = "soaking";
                            id(phase_started_ms) = millis();
                            id(phase_total_ms) = (uint32_t)(id(run_soak_min) * 60000.0f);
                        - delay: !lambda 'return (uint32_t)(id(run_soak_min) * 60.0f * 1000.0f);'
      - lambda: |-
          id(stamp_cadence_on_zone_off) = !id(run_cancel_requested);
      - script.execute:
          id: drive_zone
          zone_id: !lambda 'return id(run_zone_id);'
          state: !lambda 'return false;'
      - lambda: |-
          switch (id(run_zone_id)) {
            case 1: id(zone_1_cycle_delivered_gallons) = (id(run_gallons_done) >= id(run_goal_gallons)) ? 0.0f : id(run_gallons_done); break;
            case 2: id(zone_2_cycle_delivered_gallons) = (id(run_gallons_done) >= id(run_goal_gallons)) ? 0.0f : id(run_gallons_done); break;
            case 3: id(zone_3_cycle_delivered_gallons) = (id(run_gallons_done) >= id(run_goal_gallons)) ? 0.0f : id(run_gallons_done); break;
            case 4: id(zone_4_cycle_delivered_gallons) = (id(run_gallons_done) >= id(run_goal_gallons)) ? 0.0f : id(run_gallons_done); break;
            case 5: id(zone_5_cycle_delivered_gallons) = (id(run_gallons_done) >= id(run_goal_gallons)) ? 0.0f : id(run_gallons_done); break;
            case 6: id(zone_6_cycle_delivered_gallons) = (id(run_gallons_done) >= id(run_goal_gallons)) ? 0.0f : id(run_gallons_done); break;
            case 7: id(zone_7_cycle_delivered_gallons) = (id(run_gallons_done) >= id(run_goal_gallons)) ? 0.0f : id(run_gallons_done); break;
            case 8: id(zone_8_cycle_delivered_gallons) = (id(run_gallons_done) >= id(run_goal_gallons)) ? 0.0f : id(run_gallons_done); break;
          }
          if (id(run_cancel_requested)) {
            ESP_LOGW("engine", "Zone %d gallons-target cancelled (%s, delivered %.2f / %.2f gal)",
              id(run_zone_id), id(run_cancel_cause).c_str(), id(run_gallons_done), id(run_goal_gallons));
          } else {
            ESP_LOGI("engine", "Zone %d gallons-target complete (%.2f / %.2f gal)",
              id(run_zone_id), id(run_gallons_done), id(run_goal_gallons));
          }
          uint32_t end_pulses = (uint32_t)id(flow_pulses_total).state;
          uint32_t pulses = (end_pulses >= id(zone_run_started_pulses))
              ? end_pulses - id(zone_run_started_pulses) : 0;
          float ppg = id(pulses_per_gallon).state;
          float gallons = (ppg > 0.0f) ? (pulses / ppg) : 0.0f;
          uint32_t duration_s = (millis() - id(zone_run_started_ms)) / 1000;
          uint32_t now_epoch = id(time_synced).state ? (uint32_t)id(effective_now_epoch).state : 0;
          switch (id(run_zone_id)) {
            case 1:
              id(zone_1_run_count_total) += 1;
              id(zone_1_gallons_total) += gallons;
              id(zone_1_seconds_total) += duration_s;
              id(zone_1_last_gallons) = gallons;
              id(zone_1_last_duration_s) = duration_s;
              if (now_epoch) id(zone_1_last_run_at) = now_epoch;
              break;
            case 2:
              id(zone_2_run_count_total) += 1;
              id(zone_2_gallons_total) += gallons;
              id(zone_2_seconds_total) += duration_s;
              id(zone_2_last_gallons) = gallons;
              id(zone_2_last_duration_s) = duration_s;
              if (now_epoch) id(zone_2_last_run_at) = now_epoch;
              break;
            case 3:
              id(zone_3_run_count_total) += 1;
              id(zone_3_gallons_total) += gallons;
              id(zone_3_seconds_total) += duration_s;
              id(zone_3_last_gallons) = gallons;
              id(zone_3_last_duration_s) = duration_s;
              if (now_epoch) id(zone_3_last_run_at) = now_epoch;
              break;
            case 4:
              id(zone_4_run_count_total) += 1;
              id(zone_4_gallons_total) += gallons;
              id(zone_4_seconds_total) += duration_s;
              id(zone_4_last_gallons) = gallons;
              id(zone_4_last_duration_s) = duration_s;
              if (now_epoch) id(zone_4_last_run_at) = now_epoch;
              break;
            case 5:
              id(zone_5_run_count_total) += 1;
              id(zone_5_gallons_total) += gallons;
              id(zone_5_seconds_total) += duration_s;
              id(zone_5_last_gallons) = gallons;
              id(zone_5_last_duration_s) = duration_s;
              if (now_epoch) id(zone_5_last_run_at) = now_epoch;
              break;
            case 6:
              id(zone_6_run_count_total) += 1;
              id(zone_6_gallons_total) += gallons;
              id(zone_6_seconds_total) += duration_s;
              id(zone_6_last_gallons) = gallons;
              id(zone_6_last_duration_s) = duration_s;
              if (now_epoch) id(zone_6_last_run_at) = now_epoch;
              break;
            case 7:
              id(zone_7_run_count_total) += 1;
              id(zone_7_gallons_total) += gallons;
              id(zone_7_seconds_total) += duration_s;
              id(zone_7_last_gallons) = gallons;
              id(zone_7_last_duration_s) = duration_s;
              if (now_epoch) id(zone_7_last_run_at) = now_epoch;
              break;
            case 8:
              id(zone_8_run_count_total) += 1;
              id(zone_8_gallons_total) += gallons;
              id(zone_8_seconds_total) += duration_s;
              id(zone_8_last_gallons) = gallons;
              id(zone_8_last_duration_s) = duration_s;
              if (now_epoch) id(zone_8_last_run_at) = now_epoch;
              break;
          }
      - if:
          condition:
            lambda: |-
              return !id(run_cancel_requested) &&
                     id(run_gallons_done) >= id(run_goal_gallons);
          then:
            - script.execute:
                id: stamp_zone_last_finished
                zone_id: !lambda 'return id(run_zone_id);'

  # Single-attempt wrapper. Re-attempt pacing is owned by the scheduler via
  # `attempt_cooldown_minutes` and allowed-window checks.
  - id: run_one_zone_with_retry
    mode: single
    parameters:
      zone_id: int
      total_min: float
      cycle_min: float
      soak_min: float
    then:
      - lambda: |-
          id(retries_used_this_zone) = 0;
      - lambda: |-
          int mode = 0;
          float goal_gal = 0.0f;
          float cycle_gal = 0.0f;
          switch (zone_id) {
            case 1: mode = (int)id(zone_1_schedule_mode).state; goal_gal = id(zone_1_goal_gallons_per_cycle).state; cycle_gal = id(zone_1_cycle_gallons).state; break;
            case 2: mode = (int)id(zone_2_schedule_mode).state; goal_gal = id(zone_2_goal_gallons_per_cycle).state; cycle_gal = id(zone_2_cycle_gallons).state; break;
            case 3: mode = (int)id(zone_3_schedule_mode).state; goal_gal = id(zone_3_goal_gallons_per_cycle).state; cycle_gal = id(zone_3_cycle_gallons).state; break;
            case 4: mode = (int)id(zone_4_schedule_mode).state; goal_gal = id(zone_4_goal_gallons_per_cycle).state; cycle_gal = id(zone_4_cycle_gallons).state; break;
            case 5: mode = (int)id(zone_5_schedule_mode).state; goal_gal = id(zone_5_goal_gallons_per_cycle).state; cycle_gal = id(zone_5_cycle_gallons).state; break;
            case 6: mode = (int)id(zone_6_schedule_mode).state; goal_gal = id(zone_6_goal_gallons_per_cycle).state; cycle_gal = id(zone_6_cycle_gallons).state; break;
            case 7: mode = (int)id(zone_7_schedule_mode).state; goal_gal = id(zone_7_goal_gallons_per_cycle).state; cycle_gal = id(zone_7_cycle_gallons).state; break;
            case 8: mode = (int)id(zone_8_schedule_mode).state; goal_gal = id(zone_8_goal_gallons_per_cycle).state; cycle_gal = id(zone_8_cycle_gallons).state; break;
          }
          id(run_goal_gallons) = goal_gal;
          id(run_cycle_gallons) = cycle_gal;
          id(run_schedule_mode) = mode;
      - if:
          condition:
            lambda: 'return id(run_schedule_mode) == 1;'
          then:
            - script.execute:
                id: run_one_zone_gallons_target
                zone_id: !lambda 'return zone_id;'
                goal_gallons: !lambda 'return id(run_goal_gallons);'
                cycle_gallons: !lambda 'return id(run_cycle_gallons);'
                soak_min: !lambda 'return soak_min;'
            - wait_until:
                not:
                  script.is_running: run_one_zone_gallons_target
          else:
            - script.execute:
                id: run_one_zone
                zone_id: !lambda 'return zone_id;'
                total_min: !lambda 'return total_min;'
                cycle_min: !lambda 'return cycle_min;'
                soak_min: !lambda 'return soak_min;'
            - wait_until:
                not:
                  script.is_running: run_one_zone

  # Full cycle: iterate zones 1..8, run each through retry-aware runner if
  # enabled in the bitmask. Stop the cycle if any zone latches a fault.
  - id: run_full_cycle
    mode: single
    parameters:
      is_schedule: bool
    then:
      # Stamp the watermark before pre-flight so catch-up doesn't double-fire
      # if pre-flight fails.
      - lambda: |-
          if (id(time_synced).state) {
            id(last_run_started_epoch) = (uint32_t)id(effective_now_epoch).state;
          }
      - script.execute:
          id: run_pre_flight
          is_schedule: !lambda 'return is_schedule;'
      - wait_until:
          not:
            script.is_running: run_pre_flight
      - if:
          condition:
            lambda: 'return !id(pre_flight_passed);'
          then:
            - logger.log: "Full cycle aborted: pre-flight failed."
            - script.stop: run_full_cycle
      - lambda: |-
          ESP_LOGI("cycle", "Starting full cycle (is_schedule=%d).", is_schedule);
          id(cycle_zone_cursor) = 0;
      - while:
          condition:
            lambda: 'return id(cycle_zone_cursor) < 8;'
          then:
            - lambda: |-
                id(cycle_zone_cursor) += 1;   // now 1..8
            - if:
                condition:
                  lambda: |-
                    int zid = id(cycle_zone_cursor);
                    int mask = (int)id(zones_enabled_bitmask).state;
                    return ((mask >> (zid - 1)) & 0x1) != 0;
                then:
                  - lambda: |-
                      // Stage parameters into per-run globals so the called
                      // script reads them deterministically.
                      int zid = id(cycle_zone_cursor);
                      switch (zid) {
                        case 1:
                          id(staged_total_min) = id(zone_1_total_min).state;
                          id(staged_cycle_min) = id(zone_1_cycle_min).state;
                          id(staged_soak_min)  = id(zone_1_soak_min).state;
                          break;
                        case 2:
                          id(staged_total_min) = id(zone_2_total_min).state;
                          id(staged_cycle_min) = id(zone_2_cycle_min).state;
                          id(staged_soak_min)  = id(zone_2_soak_min).state;
                          break;
                        case 3:
                          id(staged_total_min) = id(zone_3_total_min).state;
                          id(staged_cycle_min) = id(zone_3_cycle_min).state;
                          id(staged_soak_min)  = id(zone_3_soak_min).state;
                          break;
                        case 4:
                          id(staged_total_min) = id(zone_4_total_min).state;
                          id(staged_cycle_min) = id(zone_4_cycle_min).state;
                          id(staged_soak_min)  = id(zone_4_soak_min).state;
                          break;
                        case 5:
                          id(staged_total_min) = id(zone_5_total_min).state;
                          id(staged_cycle_min) = id(zone_5_cycle_min).state;
                          id(staged_soak_min)  = id(zone_5_soak_min).state;
                          break;
                        case 6:
                          id(staged_total_min) = id(zone_6_total_min).state;
                          id(staged_cycle_min) = id(zone_6_cycle_min).state;
                          id(staged_soak_min)  = id(zone_6_soak_min).state;
                          break;
                        case 7:
                          id(staged_total_min) = id(zone_7_total_min).state;
                          id(staged_cycle_min) = id(zone_7_cycle_min).state;
                          id(staged_soak_min)  = id(zone_7_soak_min).state;
                          break;
                        case 8:
                          id(staged_total_min) = id(zone_8_total_min).state;
                          id(staged_cycle_min) = id(zone_8_cycle_min).state;
                          id(staged_soak_min)  = id(zone_8_soak_min).state;
                          break;
                      }
                  - script.execute:
                      id: run_one_zone_with_retry
                      zone_id: !lambda 'return id(cycle_zone_cursor);'
                      total_min: !lambda 'return id(staged_total_min);'
                      cycle_min: !lambda 'return id(staged_cycle_min);'
                      soak_min:  !lambda 'return id(staged_soak_min);'
                  - wait_until:
                      not:
                        script.is_running: run_one_zone_with_retry
                  # If the zone latched a fault, stop the whole cycle.
                  - if:
                      condition:
                        lambda: 'return id(any_alarm_latched);'
                      then:
                        - logger.log: "Full cycle stopped: fault latched."
                        - script.stop: run_full_cycle
      - lambda: |-
          ESP_LOGI("cycle", "Full cycle completed.");
          id(current_phase_str) = id(any_alarm_latched) ? "fault" : "idle";
          id(phase_total_ms) = 0;
          if (id(time_synced).state) {
            id(last_run_finished_epoch) = (uint32_t)id(effective_now_epoch).state;
          }
          if (id(run_cancel_requested)) {
            id(last_run_outcome_str) = "cancelled_" + id(run_cancel_cause);
          } else {
            id(last_run_outcome_str) = "completed";
          }

interval:
  - interval: 1s
    then:
      - lambda: |-
          // Phantom flow: armed whenever no zone is on (including soaking).
          static uint32_t phantom_first_seen_ms = 0;
          float gpm = id(flow_rate_gpm).state;
          if (id(gate_alarm_phantom_flow).state &&
              id(currently_on_zone) == 0 &&
              gpm > id(phantom_flow_gpm).state) {
            if (phantom_first_seen_ms == 0) phantom_first_seen_ms = millis();
            if (millis() - phantom_first_seen_ms > 5UL * 60UL * 1000UL) {
              id(alarm_phantom_flow).publish_state(true);
              id(any_alarm_latched) = true;
            }
          } else {
            phantom_first_seen_ms = 0;
          }

          // Mid-run cancel checks: only when a zone is on AND a run is active.
          if (id(run_zone_id) == 0 || id(currently_on_zone) == 0) return;

          static uint32_t high_flow_first_ms = 0;
          static uint32_t low_psi_first_ms = 0;
          static uint32_t high_psi_first_ms = 0;
          static uint32_t no_flow_first_ms = 0;
          uint32_t now_ms = millis();
          uint32_t since_zone_start_ms = now_ms - id(zone_started_at_ms);
          uint32_t startup_grace_ms = (uint32_t)(id(no_flow_grace_s).state * 1000);

          // No-flow: wait for startup grace, then require sustained low GPM.
          if (id(gate_alarm_no_flow).state &&
              since_zone_start_ms >= startup_grace_ms) {
            float min_gpm = 1.0f;
            switch (id(currently_on_zone)) {
              case 1: min_gpm = id(zone_1_min_flow_gpm).state; break;
              case 2: min_gpm = id(zone_2_min_flow_gpm).state; break;
              case 3: min_gpm = id(zone_3_min_flow_gpm).state; break;
              case 4: min_gpm = id(zone_4_min_flow_gpm).state; break;
              case 5: min_gpm = id(zone_5_min_flow_gpm).state; break;
              case 6: min_gpm = id(zone_6_min_flow_gpm).state; break;
              case 7: min_gpm = id(zone_7_min_flow_gpm).state; break;
              case 8: min_gpm = id(zone_8_min_flow_gpm).state; break;
            }
            if (gpm < min_gpm) {
              if (no_flow_first_ms == 0) no_flow_first_ms = now_ms;
              if (now_ms - no_flow_first_ms >= (uint32_t)(id(no_flow_sustain_s).state * 1000)) {
                id(alarm_no_flow).publish_state(true);
                id(run_cancel_requested) = true;
                id(run_cancel_cause) = "no_flow";
                no_flow_first_ms = 0;
              }
            } else {
              no_flow_first_ms = 0;
            }
          } else {
            no_flow_first_ms = 0;
          }

          // High flow (sustained for grace_s).
          float max_gpm = 100.0f;
          switch (id(currently_on_zone)) {
            case 1: max_gpm = id(zone_1_max_flow_gpm).state; break;
            case 2: max_gpm = id(zone_2_max_flow_gpm).state; break;
            case 3: max_gpm = id(zone_3_max_flow_gpm).state; break;
            case 4: max_gpm = id(zone_4_max_flow_gpm).state; break;
            case 5: max_gpm = id(zone_5_max_flow_gpm).state; break;
            case 6: max_gpm = id(zone_6_max_flow_gpm).state; break;
            case 7: max_gpm = id(zone_7_max_flow_gpm).state; break;
            case 8: max_gpm = id(zone_8_max_flow_gpm).state; break;
          }
          if (id(gate_alarm_high_flow).state && gpm > max_gpm) {
            if (high_flow_first_ms == 0) high_flow_first_ms = now_ms;
            if (now_ms - high_flow_first_ms >= (uint32_t)(id(high_flow_grace_s).state * 1000)) {
              id(alarm_high_flow).publish_state(true);
              id(run_cancel_requested) = true;
              id(run_cancel_cause) = "high_flow";
              high_flow_first_ms = 0;
            }
          } else {
            high_flow_first_ms = 0;
          }

          // Low running pressure: same startup grace as no-flow, then sustained low PSI.
          float p = id(pressure_psi).state;
          float min_running_psi = id(pressure_running_min_psi).state;
          uint32_t min_running_psi_grace_s = 5;
          switch (id(run_zone_id)) {
            case 1: min_running_psi = id(zone_1_minimum_running_psi).state; min_running_psi_grace_s = (uint32_t)id(zone_1_minimum_running_psi_grace_seconds).state; break;
            case 2: min_running_psi = id(zone_2_minimum_running_psi).state; min_running_psi_grace_s = (uint32_t)id(zone_2_minimum_running_psi_grace_seconds).state; break;
            case 3: min_running_psi = id(zone_3_minimum_running_psi).state; min_running_psi_grace_s = (uint32_t)id(zone_3_minimum_running_psi_grace_seconds).state; break;
            case 4: min_running_psi = id(zone_4_minimum_running_psi).state; min_running_psi_grace_s = (uint32_t)id(zone_4_minimum_running_psi_grace_seconds).state; break;
            case 5: min_running_psi = id(zone_5_minimum_running_psi).state; min_running_psi_grace_s = (uint32_t)id(zone_5_minimum_running_psi_grace_seconds).state; break;
            case 6: min_running_psi = id(zone_6_minimum_running_psi).state; min_running_psi_grace_s = (uint32_t)id(zone_6_minimum_running_psi_grace_seconds).state; break;
            case 7: min_running_psi = id(zone_7_minimum_running_psi).state; min_running_psi_grace_s = (uint32_t)id(zone_7_minimum_running_psi_grace_seconds).state; break;
            case 8: min_running_psi = id(zone_8_minimum_running_psi).state; min_running_psi_grace_s = (uint32_t)id(zone_8_minimum_running_psi_grace_seconds).state; break;
          }
          if (id(gate_alarm_low_pressure).state && since_zone_start_ms >= startup_grace_ms) {
            if (p < min_running_psi) {
              if (low_psi_first_ms == 0) low_psi_first_ms = now_ms;
              if (now_ms - low_psi_first_ms >= min_running_psi_grace_s * 1000) {
                id(alarm_low_pressure).publish_state(true);
                id(run_cancel_requested) = true;
                id(run_cancel_cause) = "low_pressure";
                low_psi_first_ms = 0;
              }
            } else {
              low_psi_first_ms = 0;
            }
          }

          // High pressure (sustained 10s); cancel only iff `high_pressure_cancels_run`.
          if (id(gate_alarm_high_pressure).state && p > id(pressure_high_psi).state) {
            if (high_psi_first_ms == 0) high_psi_first_ms = now_ms;
            if (now_ms - high_psi_first_ms >= 10 * 1000) {
              id(alarm_high_pressure).publish_state(true);
              if (id(high_pressure_cancels_run).state) {
                id(run_cancel_requested) = true;
                id(run_cancel_cause) = "high_pressure";
              }
              high_psi_first_ms = 0;
            }
          } else {
            high_psi_first_ms = 0;
          }

          // Rain sensor wet → cancel.
          if (id(gate_rain_sensor).state && id(rain_sensor).state) {
            id(rain_sensor_last_wet_epoch) = (uint32_t)id(effective_now_epoch).state;
            id(run_cancel_requested) = true;
            id(run_cancel_cause) = "rain";
          }

          // Rain accumulation/forecast gate crossed mid-run -> cancel now.
          uint32_t now_epoch = (uint32_t)id(effective_now_epoch).state;
          uint32_t ttl_s = (uint32_t)(id(rain_mm_max_age_hours).state * 3600.0f);
          float effective_mm = id(rain_mm_last_48h).state;
          uint32_t pushed = (uint32_t)id(rain_mm_last_pushed_epoch).state;
          if (pushed == 0 || now_epoch - pushed > ttl_s) {
            effective_mm = 0.0f;   // stale -> fail-open
          }
          bool rain_block = false;
          if (effective_mm > id(rain_mm_threshold_48h).state) {
            rain_block = true;
            id(rain_forecast_last_high_epoch) = now_epoch;
          } else {
            uint32_t hold_s = (uint32_t)(id(rain_hold_hours_after_forecast).state * 3600.0f);
            if (id(rain_forecast_last_high_epoch) > 0 &&
                now_epoch - id(rain_forecast_last_high_epoch) < hold_s) {
              rain_block = true;
            }
          }
          if (rain_block) {
            id(run_cancel_requested) = true;
            id(run_cancel_cause) = "rain_reschedule";
          }

