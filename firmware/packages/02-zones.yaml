# 8 zone relays + safety invariants (single-zone-on, runtime cap, boot-safe, e-stop).
#
# Relay GPIO map for the ESP32 relay x8 board used by this project:
# R1->GPIO32, R2->GPIO33, R3->GPIO25, R4->GPIO26,
# R5->GPIO27, R6->GPIO14, R7->GPIO12, R8->GPIO13.
# Relay polarity is configured as active-high below (`inverted: false`).

# Backing GPIO outputs (internal, hidden from HA).
output:
  - platform: gpio
    pin: { number: GPIO32, inverted: false }
    id: relay_1_out
  - platform: gpio
    pin: { number: GPIO33, inverted: false }
    id: relay_2_out
  - platform: gpio
    pin: { number: GPIO25, inverted: false }
    id: relay_3_out
  - platform: gpio
    pin: { number: GPIO26, inverted: false }
    id: relay_4_out
  - platform: gpio
    pin: { number: GPIO27, inverted: false }
    id: relay_5_out
  - platform: gpio
    pin: { number: GPIO14, inverted: false }
    id: relay_6_out
  - platform: gpio
    pin: { number: GPIO12, inverted: false }
    id: relay_7_out
  - platform: gpio
    pin: { number: GPIO13, inverted: false }
    id: relay_8_out

# Public per-zone switches. Turning these on routes through the safety layer.
switch:
  - platform: template
    name: "Zone 1"
    id: zone_1
    icon: mdi:water
    optimistic: false
    turn_on_action:
      - script.execute:
          id: request_zone_on
          zone_id: 1
    turn_off_action:
      - script.execute:
          id: request_zone_off
          zone_id: 1
    lambda: |-
      return id(zone_1_actual_state);

  - platform: template
    name: "Zone 2"
    id: zone_2
    icon: mdi:water
    optimistic: false
    turn_on_action:
      - script.execute: { id: request_zone_on, zone_id: 2 }
    turn_off_action:
      - script.execute: { id: request_zone_off, zone_id: 2 }
    lambda: 'return id(zone_2_actual_state);'

  - platform: template
    name: "Zone 3"
    id: zone_3
    icon: mdi:water
    optimistic: false
    turn_on_action:
      - script.execute: { id: request_zone_on, zone_id: 3 }
    turn_off_action:
      - script.execute: { id: request_zone_off, zone_id: 3 }
    lambda: 'return id(zone_3_actual_state);'

  - platform: template
    name: "Zone 4"
    id: zone_4
    icon: mdi:water
    optimistic: false
    turn_on_action:
      - script.execute: { id: request_zone_on, zone_id: 4 }
    turn_off_action:
      - script.execute: { id: request_zone_off, zone_id: 4 }
    lambda: 'return id(zone_4_actual_state);'

  - platform: template
    name: "Zone 5"
    id: zone_5
    icon: mdi:water
    optimistic: false
    turn_on_action:
      - script.execute: { id: request_zone_on, zone_id: 5 }
    turn_off_action:
      - script.execute: { id: request_zone_off, zone_id: 5 }
    lambda: 'return id(zone_5_actual_state);'

  - platform: template
    name: "Zone 6"
    id: zone_6
    icon: mdi:water
    optimistic: false
    turn_on_action:
      - script.execute: { id: request_zone_on, zone_id: 6 }
    turn_off_action:
      - script.execute: { id: request_zone_off, zone_id: 6 }
    lambda: 'return id(zone_6_actual_state);'

  - platform: template
    name: "Zone 7"
    id: zone_7
    icon: mdi:water
    optimistic: false
    turn_on_action:
      - script.execute: { id: request_zone_on, zone_id: 7 }
    turn_off_action:
      - script.execute: { id: request_zone_off, zone_id: 7 }
    lambda: 'return id(zone_7_actual_state);'

  - platform: template
    name: "Zone 8"
    id: zone_8
    icon: mdi:water
    optimistic: false
    turn_on_action:
      - script.execute: { id: request_zone_on, zone_id: 8 }
    turn_off_action:
      - script.execute: { id: request_zone_off, zone_id: 8 }
    lambda: 'return id(zone_8_actual_state);'

  - platform: template
    name: "Master enable"
    id: master_enable
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    icon: mdi:water-pump

  - platform: template
    name: "Emergency stop (latched)"
    id: emergency_stop_latched
    optimistic: true
    restore_mode: ALWAYS_OFF

# State globals. `zone_N_actual_state` reflects the *real* relay state, which
# the safety layer maintains; the public switch reads it via `lambda:`.
globals:
  - id: zone_1_actual_state
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: zone_2_actual_state
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: zone_3_actual_state
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: zone_4_actual_state
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: zone_5_actual_state
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: zone_6_actual_state
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: zone_7_actual_state
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: zone_8_actual_state
    type: bool
    restore_value: false
    initial_value: 'false'

  - id: currently_on_zone
    type: int
    restore_value: false
    initial_value: '0'
  - id: zone_started_at_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'

  # When false, drive_zone(OFF) turns the relay off without stamping
  # zone_N_last_finished_epoch. Engine uses this for soak/chunk transitions
  # and cancelled runs so cadence reflects completed waterings only.
  - id: stamp_cadence_on_zone_off
    type: bool
    restore_value: false
    initial_value: 'true'

  # Per-zone "last finished" epoch — the cadence scheduler reads these to
  # decide whether a zone is due. Written by `drive_zone` whenever a zone
  # transitions on→off, regardless of whether it was a scheduled run, manual
  # toggle, or local button press. Persisted to NVS so cadence survives reboot.
  # Default is the same baseline date as `fallback_start_epoch_est` so a fresh
  # device behaves as if each zone was last watered at that baseline.
  - id: zone_1_last_finished_epoch
    type: uint32_t
    restore_value: true
    initial_value: '1780329600'
  - id: zone_2_last_finished_epoch
    type: uint32_t
    restore_value: true
    initial_value: '1780329600'
  - id: zone_3_last_finished_epoch
    type: uint32_t
    restore_value: true
    initial_value: '1780329600'
  - id: zone_4_last_finished_epoch
    type: uint32_t
    restore_value: true
    initial_value: '1780329600'
  - id: zone_5_last_finished_epoch
    type: uint32_t
    restore_value: true
    initial_value: '1780329600'
  - id: zone_6_last_finished_epoch
    type: uint32_t
    restore_value: true
    initial_value: '1780329600'
  - id: zone_7_last_finished_epoch
    type: uint32_t
    restore_value: true
    initial_value: '1780329600'
  - id: zone_8_last_finished_epoch
    type: uint32_t
    restore_value: true
    initial_value: '1780329600'

# Buttons exposed to HA.
button:
  - platform: template
    name: "Emergency stop all"
    id: emergency_stop_all
    icon: mdi:stop-circle
    internal: true
    on_press:
      - script.execute: cancel_everything

# Helper scripts. The safety layer lives entirely in these.
script:
  # Request to turn zone N on. Handles single-zone invariant + inter-zone delay.
  - id: request_zone_on
    mode: queued
    parameters:
      zone_id: int
    then:
      - if:
          condition:
            or:
              - switch.is_off: master_enable
              - switch.is_on: emergency_stop_latched
          then:
            - logger.log: "Master disabled or e-stop latched; refusing zone request."
            - script.stop: request_zone_on
      - if:
          condition:
            lambda: 'return id(currently_on_zone) != 0 && id(currently_on_zone) != zone_id;'
          then:
            - script.execute: turn_off_current_zone
            - delay: !lambda 'return (uint32_t)(id(inter_zone_delay_s).state * 1000);'
      - script.execute:
          id: drive_zone
          zone_id: !lambda 'return zone_id;'
          state: !lambda 'return true;'

  - id: request_zone_off
    mode: queued
    parameters:
      zone_id: int
    then:
      - script.execute:
          id: drive_zone
          zone_id: !lambda 'return zone_id;'
          state: !lambda 'return false;'

  - id: drive_zone
    mode: queued
    parameters:
      zone_id: int
      state: bool
    then:
      - lambda: |-
          // Drive the right relay and update the matching state global.
          switch (zone_id) {
            case 1: state ? id(relay_1_out).turn_on() : id(relay_1_out).turn_off(); id(zone_1_actual_state) = state; break;
            case 2: state ? id(relay_2_out).turn_on() : id(relay_2_out).turn_off(); id(zone_2_actual_state) = state; break;
            case 3: state ? id(relay_3_out).turn_on() : id(relay_3_out).turn_off(); id(zone_3_actual_state) = state; break;
            case 4: state ? id(relay_4_out).turn_on() : id(relay_4_out).turn_off(); id(zone_4_actual_state) = state; break;
            case 5: state ? id(relay_5_out).turn_on() : id(relay_5_out).turn_off(); id(zone_5_actual_state) = state; break;
            case 6: state ? id(relay_6_out).turn_on() : id(relay_6_out).turn_off(); id(zone_6_actual_state) = state; break;
            case 7: state ? id(relay_7_out).turn_on() : id(relay_7_out).turn_off(); id(zone_7_actual_state) = state; break;
            case 8: state ? id(relay_8_out).turn_on() : id(relay_8_out).turn_off(); id(zone_8_actual_state) = state; break;
          }
          if (state) {
            id(currently_on_zone) = zone_id;
            id(zone_started_at_ms) = millis();
          } else if (id(currently_on_zone) == zone_id) {
            // Stamp last-finished epoch for cadence when this OFF completes a
            // watering (not soak/chunk transitions or fault cancels).
            uint32_t now_e = (uint32_t)id(effective_now_epoch).state;
            if (now_e > 0 && id(stamp_cadence_on_zone_off)) {
              switch (zone_id) {
                case 1: id(zone_1_last_finished_epoch) = now_e; break;
                case 2: id(zone_2_last_finished_epoch) = now_e; break;
                case 3: id(zone_3_last_finished_epoch) = now_e; break;
                case 4: id(zone_4_last_finished_epoch) = now_e; break;
                case 5: id(zone_5_last_finished_epoch) = now_e; break;
                case 6: id(zone_6_last_finished_epoch) = now_e; break;
                case 7: id(zone_7_last_finished_epoch) = now_e; break;
                case 8: id(zone_8_last_finished_epoch) = now_e; break;
              }
            }
            id(stamp_cadence_on_zone_off) = true;
            id(currently_on_zone) = 0;
            id(zone_started_at_ms) = 0;
          }
      - lambda: |-
          // Re-publish the switch state so HA reflects the actual relay state.
          switch (zone_id) {
            case 1: id(zone_1).publish_state(id(zone_1_actual_state)); break;
            case 2: id(zone_2).publish_state(id(zone_2_actual_state)); break;
            case 3: id(zone_3).publish_state(id(zone_3_actual_state)); break;
            case 4: id(zone_4).publish_state(id(zone_4_actual_state)); break;
            case 5: id(zone_5).publish_state(id(zone_5_actual_state)); break;
            case 6: id(zone_6).publish_state(id(zone_6_actual_state)); break;
            case 7: id(zone_7).publish_state(id(zone_7_actual_state)); break;
            case 8: id(zone_8).publish_state(id(zone_8_actual_state)); break;
          }

  - id: turn_off_current_zone
    mode: single
    then:
      - if:
          condition:
            lambda: 'return id(currently_on_zone) != 0;'
          then:
            - script.execute:
                id: drive_zone
                zone_id: !lambda 'return id(currently_on_zone);'
                state: !lambda 'return false;'

  - id: cancel_everything
    mode: single
    then:
      - lambda: |-
          // Force every relay off, regardless of state. Cadence is stamped only
          // via drive_zone when a run completes or the user turns a zone off.
          id(relay_1_out).turn_off(); id(zone_1_actual_state) = false; id(zone_1).publish_state(false);
          id(relay_2_out).turn_off(); id(zone_2_actual_state) = false; id(zone_2).publish_state(false);
          id(relay_3_out).turn_off(); id(zone_3_actual_state) = false; id(zone_3).publish_state(false);
          id(relay_4_out).turn_off(); id(zone_4_actual_state) = false; id(zone_4).publish_state(false);
          id(relay_5_out).turn_off(); id(zone_5_actual_state) = false; id(zone_5).publish_state(false);
          id(relay_6_out).turn_off(); id(zone_6_actual_state) = false; id(zone_6).publish_state(false);
          id(relay_7_out).turn_off(); id(zone_7_actual_state) = false; id(zone_7).publish_state(false);
          id(relay_8_out).turn_off(); id(zone_8_actual_state) = false; id(zone_8).publish_state(false);
          id(currently_on_zone) = 0;
          id(zone_started_at_ms) = 0;

# Boot-safe: every relay forced off as soon as ESPHome's main loop starts.
esphome:
  on_boot:
    priority: 800
    then:
      - script.execute: cancel_everything

# Periodic safety: runtime cap (uses global `maximum_runtime_minutes` tunable).
interval:
  - interval: 1s
    then:
      - if:
          condition:
            lambda: |-
              if (id(currently_on_zone) == 0) return false;
              uint32_t elapsed_ms = millis() - id(zone_started_at_ms);
              float cap_min = id(maximum_runtime_minutes).state;
              return elapsed_ms > (uint32_t)(cap_min * 60.0f * 1000.0f);
          then:
            - logger.log: "Runtime cap exceeded; cutting zone."
            - script.execute: cancel_everything
            - binary_sensor.template.publish:
                id: alarm_runtime_exceeded
                state: true

binary_sensor:
  - platform: template
    name: "Alarm: runtime exceeded"
    id: alarm_runtime_exceeded
    device_class: problem
