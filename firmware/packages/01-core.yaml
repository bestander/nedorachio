# WiFi, ESPHome API (HA connection), OTA, time sources, and core status sensors.

logger:
  level: INFO
  baud_rate: 115200

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${device_name} fallback"
    password: !secret ota_password

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

# Time sources:
# - Primary: HA time (`ha_time`) once available.
# - Fallback: max(persisted last_known_epoch, hardcoded baseline) + uptime.
#   `last_known_epoch` is rewritten hourly while HA time is valid, so after a
#   reboot the controller resumes time within ~1h of reality.
globals:
  # 2026-06-01 11:00:00 EST (UTC-5) as epoch seconds. Used only on the very
  # first boot before any HA sync has ever happened.
  - id: fallback_start_epoch_est
    type: uint32_t
    restore_value: false
    initial_value: '1780329600'
  - id: fallback_boot_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  # RAM-only clock anchor while HA time is valid (HA restores via Last known epoch).
  - id: last_known_epoch
    type: uint32_t
    restore_value: false
    initial_value: '0'
  # Baseline locked in at first fallback-clock read this boot.
  - id: fallback_baseline_epoch
    type: uint32_t
    restore_value: false
    initial_value: '0'

time:
  - platform: homeassistant
    id: ha_time
  - platform: sntp
    id: sntp_time
    servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org
      - 2.pool.ntp.org

# Persist a clock anchor every hour while HA time is valid. NVS wear is
# bounded (~9k writes/year vs. wear-leveled budget of millions).
interval:
  - interval: 1h
    then:
      - lambda: |-
          auto ha_now = id(ha_time).now();
          if (ha_now.is_valid()) {
            id(last_known_epoch) = (uint32_t)ha_now.timestamp;
          }

sensor:
  - platform: template
    name: "Controller time (epoch)"
    id: effective_now_epoch
    internal: true
    update_interval: 1s
    accuracy_decimals: 0
    lambda: |-
      auto ha_now = id(ha_time).now();
      if (ha_now.is_valid()) {
        return (float)ha_now.timestamp;
      }
      if (id(fallback_boot_ms) == 0) {
        id(fallback_boot_ms) = millis();
        uint32_t baseline = id(fallback_start_epoch_est);
        if (id(last_known_epoch) > baseline) {
          baseline = id(last_known_epoch);
        }
        id(fallback_baseline_epoch) = baseline;
      }
      uint32_t elapsed_s = (millis() - id(fallback_boot_ms)) / 1000UL;
      return (float)(id(fallback_baseline_epoch) + elapsed_s);

binary_sensor:
  - platform: template
    name: "Time synced"
    id: time_synced
    device_class: connectivity
    icon: mdi:clock-check
    lambda: |-
      // Fallback clock is always available; HA time takes over once valid.
      return id(effective_now_epoch).state > 0.0f;

  - platform: template
    name: "HA time available"
    id: ha_time_available
    device_class: connectivity
    icon: mdi:home-clock
    lambda: |-
      return id(ha_time).now().is_valid();

  - platform: status
    name: "Controller online"
    id: controller_online
    device_class: connectivity
