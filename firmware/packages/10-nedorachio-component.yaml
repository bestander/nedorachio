# Publish zone last-watering epochs back to HA input_text helpers.
globals:
  - id: ha_publish_epoch
    type: uint32_t
    restore_value: no
    initial_value: '0'

script:
  - id: ha_pub_z1_last_watering
    then:
      - homeassistant.action:
          action: input_text.set_value
          data:
            entity_id: input_text.nedorachio_zone_1_last_watering
            value: !lambda 'return std::to_string(id(ha_publish_epoch));'
  - id: ha_pub_z2_last_watering
    then:
      - homeassistant.action:
          action: input_text.set_value
