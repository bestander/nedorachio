            entity_id: input_text.nedorachio_zone_6_last_watering
            value: !lambda 'return std::to_string(id(ha_publish_epoch));'
  - id: ha_pub_z7_last_watering
    then:
      - homeassistant.action:
          action: input_text.set_value
          data:
            entity_id: input_text.nedorachio_zone_7_last_watering
            value: !lambda 'return std::to_string(id(ha_publish_epoch));'
  - id: ha_pub_z8_last_watering
    then:
      - homeassistant.action:
          action: input_text.set_value
          data:
            entity_id: input_text.nedorachio_zone_8_last_watering
            value: !lambda 'return std::to_string(id(ha_publish_epoch));'

interval:
  - interval: 1s
    then:
      - lambda: |-
          auto req = id(irrigation).consume_ha_publish_request();
          if (req.zone > 0) {
            id(ha_publish_epoch) = req.epoch;
            switch (req.zone) {
              case 1: id(ha_pub_z1_last_watering).execute(); break;
              case 2: id(ha_pub_z2_last_watering).execute(); break;
              case 3: id(ha_pub_z3_last_watering).execute(); break;
              case 4: id(ha_pub_z4_last_watering).execute(); break;
              case 5: id(ha_pub_z5_last_watering).execute(); break;
              case 6: id(ha_pub_z6_last_watering).execute(); break;
              case 7: id(ha_pub_z7_last_watering).execute(); break;
              case 8: id(ha_pub_z8_last_watering).execute(); break;
            }
          }

