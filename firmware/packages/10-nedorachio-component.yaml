    pin: { number: GPIO32, inverted: false }
    id: relay_1_out
  - platform: gpio
    pin: { number: GPIO33, inverted: false }
    id: relay_2_out
  - platform: gpio
    pin: { number: GPIO25, inverted: false }
    id: relay_3_out
  - platform: gpio
    pin: { number: GPIO26, inverted: false }
    id: relay_4_out
  - platform: gpio
    pin: { number: GPIO27, inverted: false }
    id: relay_5_out
  - platform: gpio
    pin: { number: GPIO14, inverted: false }
    id: relay_6_out
  - platform: gpio
    pin: { number: GPIO12, inverted: false }
    id: relay_7_out
  - platform: gpio
    pin: { number: GPIO13, inverted: false }
    id: relay_8_out

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO18
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Rain sensor"
    id: rain_sensor
    device_class: moisture
    filters:
      - delayed_on_off: 500ms

sensor:
  - platform: pulse_meter
    name: "Irrigation Flow Pulses"
    id: flow_pulses
    pin:
      number: GPIO19
      mode:
        input: true
      inverted: true
    unit_of_measurement: "pulses/min"
    timeout: 2s
    internal_filter: 500us
    total:
      name: "Flow Pulses Total"
      id: flow_pulses_total
      unit_of_measurement: "pulses"
      accuracy_decimals: 0

  - platform: template
    name: "Flow Rate (GPM)"
    id: flow_rate_gpm
    unit_of_measurement: "GPM"
    update_interval: 5s
    lambda: |-
      static uint32_t last_total = 0;
      static uint32_t last_ms = 0;
      static float ema_gpm = 0.0f;
      uint32_t now_ms = millis();
      float ppg = 344.4f;
      uint32_t total = (uint32_t) id(flow_pulses_total).state;
      if (last_ms == 0) {
        last_ms = now_ms;
        last_total = total;
        return 0.0f;
      }
      uint32_t dt_ms = now_ms - last_ms;
      if (dt_ms < 5000) return ema_gpm;
      int32_t dp = (int32_t) total - (int32_t) last_total;
      if (dp < 0) dp = 0;
      float inst_gpm = (dp > 0) ? ((float) dp * 60000.0f / (float) dt_ms / ppg) : 0.0f;
      ema_gpm = (ema_gpm == 0.0f) ? inst_gpm : (0.7f * ema_gpm + 0.3f * inst_gpm);
      last_total = total;
      last_ms = now_ms;
      return ema_gpm;

  # Pressure: ADC1 input from pressure sensor through a 10k/20k divider.
  # ADC node sees ~2/3 of transducer output.
  - platform: adc
    pin: GPIO34
    name: "Pressure"
    id: pressure_psi
    update_interval: 1s
    attenuation: 11db
    accuracy_decimals: 1
    unit_of_measurement: "psi"
    filters:
      - sliding_window_moving_average:
          window_size: 5
          send_every: 1
      # Calibration points for divider midpoint (R4=10k, R5=20k).
      - calibrate_linear:
          method: exact
          datapoints:
            - 0.000 -> 0.0
            - 0.240 -> 10.0
            - 0.460 -> 20.0
            - 0.680 -> 30.0
            - 0.900 -> 40.0
            - 1.120 -> 50.0
            - 1.360 -> 60.0
            - 1.600 -> 70.0
            - 1.840 -> 80.0
            - 2.080 -> 90.0
            - 2.320 -> 100.0
      - clamp:
          min_value: 0.0
          max_value: 100.0

