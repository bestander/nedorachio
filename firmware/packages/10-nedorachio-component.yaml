nedorachio:
  id: irrigation
  time_id: ha_time
  pressure_sensor_id: pressure_psi
  flow_gpm_sensor_id: flow_rate_gpm
  flow_total_sensor_id: flow_pulses_total
  rain_sensor_id: rain_sensor
  zone_outputs:
    - relay_1_out
    - relay_2_out
    - relay_3_out
    - relay_4_out
    - relay_5_out
    - relay_6_out
    - relay_7_out
    - relay_8_out

esphome:
  on_boot:
    priority: -100
    then:
      - output.turn_off: relay_1_out
      - output.turn_off: relay_2_out
      - output.turn_off: relay_3_out
      - output.turn_off: relay_4_out
      - output.turn_off: relay_5_out
      - output.turn_off: relay_6_out
      - output.turn_off: relay_7_out
      - output.turn_off: relay_8_out
