# Local physical controls: status/select LED + start/stop button + zone-select button.
#
# Placeholder GPIOs — verify against the actual board and update the pin
# numbers and any `inverted:` flags. The buttons assume momentary,
# normally-open switches between the GPIO and ground (internal pull-up
# enabled). The LED assumes the GPIO drives the LED through a current-limit
# resistor; flip `inverted:` if your wiring is active-low.

output:
  - platform: gpio
    pin: { number: GPIO4, inverted: false }
    id: led_out

globals:
  - id: selected_zone
    type: int
    restore_value: false
    initial_value: '1'

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO21
      mode:
        input: true
        pullup: true
      inverted: true       # button-to-ground reads as `on` when pressed
    name: "Local start/stop button"
    id: btn_start_stop
    filters:
      - delayed_on_off: 30ms
    on_press:
      - script.execute: local_start_stop

  - platform: gpio
    pin:
      number: GPIO22
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Local zone-select button"
    id: btn_zone_select
    filters:
      - delayed_on_off: 30ms
    on_press:
      - script.execute: local_cycle_select

# Re-assert LED state every 200ms unless a blink is in progress. Cheap, and
# guarantees the LED tracks the watering state regardless of which path
# started/stopped it (HA switch, schedule, manual button, OTA reboot, etc.).
interval:
  - interval: 200ms
    then:
      - lambda: |-
          if (id(blink_n_times).is_running()) return;
          if (id(currently_on_zone) != 0) {
            id(led_out).turn_on();
          } else {
            id(led_out).turn_off();
          }

script:
  - id: blink_n_times
    mode: restart   # second press while blinking restarts the count cleanly
    parameters:
      count: int
    then:
      - lambda: 'id(led_out).turn_off();'
      - delay: 300ms   # gap between press and first blink so it reads cleanly
      - repeat:
          count: !lambda 'return count;'
          then:
            - lambda: 'id(led_out).turn_on();'
            - delay: 200ms
            - lambda: 'id(led_out).turn_off();'
            - delay: 250ms
      # Return LED to whatever the watering state implies. The 200ms interval
      # would also do this on its next tick — but doing it here makes the
      # transition instant rather than up to 200ms late.
      - lambda: |-
          if (id(currently_on_zone) != 0) id(led_out).turn_on();
          else id(led_out).turn_off();

  - id: local_cycle_select
    mode: single
    then:
      - lambda: |-
          int mask = (int)id(zones_enabled_bitmask).state;
          if (mask == 0) {
            ESP_LOGW("local", "No zones enabled in bitmask; nothing to cycle.");
            return;
          }
          int sz = id(selected_zone);
          // Walk forward 1..8 with wrap; stop at the first enabled zone.
          for (int i = 0; i < 8; i++) {
            sz = (sz % 8) + 1;
            if (((mask >> (sz - 1)) & 0x1) != 0) break;
          }
          id(selected_zone) = sz;
          ESP_LOGI("local", "Selected zone %d", sz);
      - script.execute:
          id: blink_n_times
          count: !lambda 'return id(selected_zone);'

  - id: local_start_stop
    mode: single
    then:
      - if:
          condition:
            lambda: |-
              return id(currently_on_zone) != 0
                  || id(run_one_zone).is_running()
                  || id(run_one_zone_with_retry).is_running()
                  || id(run_full_cycle).is_running();
          then:
            # ----- STOP -----
            - lambda: |-
                ESP_LOGI("local", "Stop pressed; cancelling.");
                id(run_cancel_requested) = true;
                id(run_cancel_cause) = "user";
            - script.stop: run_full_cycle
            - script.stop: run_one_zone_with_retry
            - script.stop: run_one_zone
            - script.execute: cancel_everything
            - script.stop: blink_n_times
            - lambda: 'id(led_out).turn_off();'
          else:
            # ----- START selected zone -----
            # Stage the zone's tunables, then clamp the total (and the cycle
            # so a single cycle can't outlast the cap) by `local_button_max_min`.
            # `staged_*` globals are shared with run_full_cycle but never
            # accessed concurrently — both schedulers run mode: single.
            - lambda: |-
                int zid = id(selected_zone);
                switch (zid) {
                  case 1:
                    id(staged_total_min) = id(zone_1_total_min).state;
                    id(staged_cycle_min) = id(zone_1_cycle_min).state;
                    id(staged_soak_min)  = id(zone_1_soak_min).state;
                    break;
                  case 2:
                    id(staged_total_min) = id(zone_2_total_min).state;
                    id(staged_cycle_min) = id(zone_2_cycle_min).state;
                    id(staged_soak_min)  = id(zone_2_soak_min).state;
                    break;
                  case 3:
                    id(staged_total_min) = id(zone_3_total_min).state;
                    id(staged_cycle_min) = id(zone_3_cycle_min).state;
                    id(staged_soak_min)  = id(zone_3_soak_min).state;
                    break;
                  case 4:
                    id(staged_total_min) = id(zone_4_total_min).state;
                    id(staged_cycle_min) = id(zone_4_cycle_min).state;
                    id(staged_soak_min)  = id(zone_4_soak_min).state;
                    break;
                  case 5:
                    id(staged_total_min) = id(zone_5_total_min).state;
                    id(staged_cycle_min) = id(zone_5_cycle_min).state;
                    id(staged_soak_min)  = id(zone_5_soak_min).state;
                    break;
                  case 6:
                    id(staged_total_min) = id(zone_6_total_min).state;
                    id(staged_cycle_min) = id(zone_6_cycle_min).state;
                    id(staged_soak_min)  = id(zone_6_soak_min).state;
                    break;
                  case 7:
                    id(staged_total_min) = id(zone_7_total_min).state;
                    id(staged_cycle_min) = id(zone_7_cycle_min).state;
                    id(staged_soak_min)  = id(zone_7_soak_min).state;
                    break;
                  case 8:
                    id(staged_total_min) = id(zone_8_total_min).state;
                    id(staged_cycle_min) = id(zone_8_cycle_min).state;
                    id(staged_soak_min)  = id(zone_8_soak_min).state;
                    break;
                }
                float cap = id(local_button_max_min).state;
                if (id(staged_total_min) > cap) id(staged_total_min) = cap;
                if (id(staged_cycle_min) > id(staged_total_min)) id(staged_cycle_min) = id(staged_total_min);
                ESP_LOGI("local", "Start pressed; zone %d for %.1f min (cycle %.1f, soak %.1f, cap %.1f).",
                  zid, id(staged_total_min), id(staged_cycle_min), id(staged_soak_min), cap);
            - script.stop: blink_n_times
            - lambda: 'id(led_out).turn_on();'
            - script.execute:
                id: run_one_zone_with_retry
                zone_id: !lambda 'return id(selected_zone);'
                total_min: !lambda 'return id(staged_total_min);'
                cycle_min: !lambda 'return id(staged_cycle_min);'
                soak_min: !lambda 'return id(staged_soak_min);'

# Expose the selected zone to HA for visibility from the dashboard.
sensor:
  - platform: template
    name: "Selected zone (local)"
    id: selected_zone_sensor
    update_interval: 1s
    accuracy_decimals: 0
    lambda: 'return (float)id(selected_zone);'
