  - platform: template
    name: "Rain mm last 48h"          # HA-pushable
    id: rain_mm_last_48h
    optimistic: true
    restore_value: false
    initial_value: 0
    min_value: 0
    max_value: 500
    step: 0.1
    unit_of_measurement: "mm"
    on_value:
      - lambda: |-
          // Stamp the push timestamp so the device can detect stale data.
          if (id(time_synced).state) {
            id(rain_mm_last_pushed_epoch).publish_state((uint32_t)id(effective_now_epoch).state);
          }

