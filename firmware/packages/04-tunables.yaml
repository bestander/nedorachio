    optimistic: true
    restore_value: true
    initial_value: 8
    min_value: 0
    max_value: 23
    step: 1

  - platform: template
    name: "Schedule end minute"
    id: schedule_end_minute
    optimistic: true
    restore_value: true
    initial_value: 0
    min_value: 0
    max_value: 59
    step: 1

