    step: 1

  # Internal: timestamp of the last `rain_mm_last_48h` write. Used by the
  # pre-flight gate's TTL check so stale weather data fails open.
  - platform: template
    name: "Last rain mm push (epoch s)"
    id: rain_mm_last_pushed_epoch
    optimistic: true
    restore_value: false
    initial_value: 0
    min_value: 0
    max_value: 4000000000
    step: 1
    internal: true

  - platform: template
    name: "Zones enabled bitmask"      # which of zones 1..8 are enabled (bit 0 = zone 1)
    id: zones_enabled_bitmask
    optimistic: true
    restore_value: true
    initial_value: 15      # 0b00001111 = zones 1..4 enabled by default
    min_value: 0
    max_value: 255
    step: 1

# Schedule day-of-week mask: 7 booleans (Sun..Sat). True = run that day.
switch:
  - platform: template
    name: "Schedule Sunday"
    id: sched_sun
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
  - platform: template
    name: "Schedule Monday"
    id: sched_mon
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
  - platform: template
    name: "Schedule Tuesday"
    id: sched_tue
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
  - platform: template
    name: "Schedule Wednesday"
    id: sched_wed
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
  - platform: template
    name: "Schedule Thursday"
    id: sched_thu
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
  - platform: template
    name: "Schedule Friday"
    id: sched_fri
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
  - platform: template
    name: "Schedule Saturday"
    id: sched_sat
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

  - platform: template
    name: "Fallback schedule enabled"
    id: fallback_schedule_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

  - platform: template
    name: "High pressure cancels run"
    id: high_pressure_cancels_run
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
