    unit_of_measurement: "s"

  # --- Watering window (cadence-based scheduler) ---
  # The evaluator only *starts* a zone inside [start, end). A zone already
  # running when the window closes is allowed to finish (no hard cut).
  # If end < start the window wraps midnight (e.g. 22 → 6).
  - platform: template
    name: "Schedule start hour"
    id: schedule_start_hour
    optimistic: true
    restore_value: true
    initial_value: 0
    min_value: 0
    max_value: 23
    step: 1

  - platform: template
    name: "Schedule start minute"
    id: schedule_start_minute
    optimistic: true
    restore_value: true
    initial_value: 0
    min_value: 0
    max_value: 59
    step: 1

  - platform: template
    name: "Schedule end hour"
    id: schedule_end_hour
    optimistic: true
    restore_value: true
    initial_value: 8
    min_value: 0
    max_value: 23
    step: 1

  - platform: template
    name: "Schedule end minute"
    id: schedule_end_minute
    optimistic: true
    restore_value: true
    initial_value: 0
    min_value: 0
    max_value: 59
    step: 1

