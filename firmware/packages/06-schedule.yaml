# Cadence-based scheduler.
#
# Each zone has a `min_interval_hours` (how long to wait between waterings)
# and the system watering window is global (`schedule_start_*`/`schedule_end_*`).
# Every 60s the evaluator picks the first enabled zone whose cadence is due,
# checks the window + safety gates, and fires it. Zones run one-at-a-time;
# manual runs (HA toggle, local buttons) reset the cadence the same way as
# scheduled runs because the timestamp is stamped in `drive_zone`.

globals:
  - id: skip_next_run_pending
    type: bool
    restore_value: true
    initial_value: 'false'
  - id: last_run_started_epoch
    type: uint32_t
    restore_value: true
    initial_value: '0'

  # --- Plan-readout state ---
  - id: current_phase_str
    type: std::string
    restore_value: false
    initial_value: '"idle"'
  - id: phase_started_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: phase_total_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: last_run_finished_epoch
    type: uint32_t
    restore_value: true
    initial_value: '0'
  - id: last_run_outcome_str
    type: std::string
    restore_value: true
    initial_value: '""'

  # Internal: zone the evaluator picked for the current tick.
  - id: due_zone_id
    type: int
    restore_value: false
    initial_value: '0'
  - id: last_non_completed_attempt_epoch
    type: uint32_t
    restore_value: true
    initial_value: '0'

  # Computed plan: next scheduled start epoch per zone (serial queue, see interval below).
  - id: zone_1_scheduled_next_epoch
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: zone_2_scheduled_next_epoch
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: zone_3_scheduled_next_epoch
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: zone_4_scheduled_next_epoch
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: zone_5_scheduled_next_epoch
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: zone_6_scheduled_next_epoch
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: zone_7_scheduled_next_epoch
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: zone_8_scheduled_next_epoch
    type: uint32_t
    restore_value: false
    initial_value: '0'

button:
  - platform: template
    name: "Skip next run"
    id: skip_next_run
    icon: mdi:skip-next-circle
    internal: true
    on_press:
      - lambda: |-
          id(skip_next_run_pending) = true;
          ESP_LOGI("schedule", "Next due zone will be skipped.");

# Plan next scheduled starts for HA: cadence + watering window + blackout, then
# serialize zones using maximum_runtime_minutes per zone (single-zone invariant).
interval:
  - interval: 30s
    then:
      - lambda: |-
          id(zone_1_scheduled_next_epoch) = 0;
          id(zone_2_scheduled_next_epoch) = 0;
          id(zone_3_scheduled_next_epoch) = 0;
          id(zone_4_scheduled_next_epoch) = 0;
          id(zone_5_scheduled_next_epoch) = 0;
          id(zone_6_scheduled_next_epoch) = 0;
          id(zone_7_scheduled_next_epoch) = 0;
          id(zone_8_scheduled_next_epoch) = 0;
          if (!id(fallback_schedule_enabled).state)
            return;

          uint32_t now_epoch = (uint32_t) id(effective_now_epoch).state;
          if (now_epoch == 0)
            return;

          int start_min_cfg =
              (int) id(schedule_start_hour).state * 60 + (int) id(schedule_start_minute).state;
          int end_min_cfg =
              (int) id(schedule_end_hour).state * 60 + (int) id(schedule_end_minute).state;
          if (start_min_cfg == end_min_cfg)
            return;

          auto snap_next = [&](uint32_t earliest) -> uint32_t {
            uint32_t t = (earliest / 60u) * 60u;
            if (t < earliest)
              t += 60;
            for (int iter = 0; iter < 20160; iter++) {
              int hour = 0;
              int minute = 0;
              int dow_mon0 = 0;
              if (id(ha_time).now().is_valid()) {
                time_t tt = (time_t) t;
                struct tm lt {};
                localtime_r(&tt, &lt);
                hour = lt.tm_hour;
                minute = lt.tm_min;
                dow_mon0 = (lt.tm_wday + 6) % 7;
              } else {
                time_t est_epoch = (time_t) t - 5 * 3600;
                struct tm tm_est {};
                gmtime_r(&est_epoch, &tm_est);
                hour = tm_est.tm_hour;
                minute = tm_est.tm_min;
                dow_mon0 = (tm_est.tm_wday + 6) % 7;
              }
              int now_min = hour * 60 + minute;
              bool in_window;
              if (start_min_cfg < end_min_cfg) {
                in_window = (now_min >= start_min_cfg && now_min < end_min_cfg);
              } else {
                in_window = (now_min >= start_min_cfg || now_min < end_min_cfg);
              }
              int bmask = (int) id(blackout_weekday_bitmask).state;
              bool blackout = ((bmask >> dow_mon0) & 1) != 0;
              if (in_window && !blackout)
                return t;
              t += 60;
            }
            return 0;
          };

          uint32_t ideals[8];
          int zids[8];
          int n = 0;

          int mask = (int) id(zones_enabled_bitmask).state;
          for (int zid = 1; zid <= 8; zid++) {
            if (((mask >> (zid - 1)) & 1) == 0)
              continue;

            uint32_t last_finished = 0;
            float interval_h = 0;
            switch (zid) {
              case 1:
                last_finished = id(zone_1_last_finished_epoch);
                interval_h = id(zone_1_min_interval_hours).state;
                break;
              case 2:
                last_finished = id(zone_2_last_finished_epoch);
                interval_h = id(zone_2_min_interval_hours).state;
                break;
              case 3:
                last_finished = id(zone_3_last_finished_epoch);
                interval_h = id(zone_3_min_interval_hours).state;
                break;
              case 4:
                last_finished = id(zone_4_last_finished_epoch);
                interval_h = id(zone_4_min_interval_hours).state;
                break;
              case 5:
                last_finished = id(zone_5_last_finished_epoch);
                interval_h = id(zone_5_min_interval_hours).state;
                break;
              case 6:
                last_finished = id(zone_6_last_finished_epoch);
                interval_h = id(zone_6_min_interval_hours).state;
                break;
              case 7:
                last_finished = id(zone_7_last_finished_epoch);
                interval_h = id(zone_7_min_interval_hours).state;
                break;
              case 8:
                last_finished = id(zone_8_last_finished_epoch);
                interval_h = id(zone_8_min_interval_hours).state;
                break;
            }

            if (interval_h <= 0.0f)
              continue;

            uint32_t interval_s = (uint32_t) (interval_h * 3600.0f);
            if (last_finished == 0)
              last_finished = id(fallback_start_epoch_est);

            uint64_t raw_due_64 = (uint64_t) last_finished + interval_s;
            uint32_t raw_due =
                raw_due_64 > 0xFFFFFFFFu ? 0xFFFFFFFFu : (uint32_t) raw_due_64;
            uint32_t ideal = snap_next(raw_due);
            if (ideal == 0)
              continue;

            ideals[n] = ideal;
            zids[n] = zid;
            n++;
          }

          for (int i = 0; i < n - 1; i++) {
            int best = i;
            for (int j = i + 1; j < n; j++) {
              if (ideals[j] < ideals[best] ||
                  (ideals[j] == ideals[best] && zids[j] < zids[best]))
                best = j;
            }
            if (best != i) {
              uint32_t ti = ideals[i];
              ideals[i] = ideals[best];
              ideals[best] = ti;
              int tz = zids[i];
              zids[i] = zids[best];
              zids[best] = tz;
            }
          }

          uint32_t cursor = now_epoch;
          uint32_t dur_s = (uint32_t) (id(maximum_runtime_minutes).state * 60.0f);
          if (dur_s < 60)
            dur_s = 60;

          uint32_t assigned[9];
          for (int z = 1; z <= 8; z++)
            assigned[z] = 0;

          for (int i = 0; i < n; i++) {
            uint32_t ideal = ideals[i];
            int z = zids[i];
            uint32_t merged = ideal > cursor ? ideal : cursor;
            uint32_t actual = snap_next(merged);
            if (actual == 0)
              continue;
            assigned[z] = actual;
            uint64_t nc = (uint64_t) actual + dur_s;
            cursor = nc > 0xFFFFFFFFu ? 0xFFFFFFFFu : (uint32_t) nc;
          }

          id(zone_1_scheduled_next_epoch) = assigned[1];
          id(zone_2_scheduled_next_epoch) = assigned[2];
          id(zone_3_scheduled_next_epoch) = assigned[3];
          id(zone_4_scheduled_next_epoch) = assigned[4];
          id(zone_5_scheduled_next_epoch) = assigned[5];
          id(zone_6_scheduled_next_epoch) = assigned[6];
          id(zone_7_scheduled_next_epoch) = assigned[7];
          id(zone_8_scheduled_next_epoch) = assigned[8];

  # Cadence evaluator: runs every 60s; cheap when nothing is due.
  - interval: 60s
    then:
      - lambda: |-
          if (!id(fallback_schedule_enabled).state) return;
          if (id(currently_on_zone) != 0) return;
          if (id(run_one_zone).is_running()) return;
          if (id(run_one_zone_with_retry).is_running()) return;
          if (id(run_full_cycle).is_running()) return;
          if (id(schedule_fire_handler).is_running()) return;

          uint32_t now_epoch = (uint32_t)id(effective_now_epoch).state;
          if (now_epoch == 0) return;
          uint32_t cooldown_s = (uint32_t)(id(attempt_cooldown_minutes).state * 60.0f);
          if (cooldown_s > 0 && id(last_non_completed_attempt_epoch) > 0 &&
              now_epoch < id(last_non_completed_attempt_epoch) + cooldown_s) {
            return;
          }

          // Compute wall-clock hour/minute from HA time when valid, else
          // fallback EST (matches the offline clock in 01-core).
          int hour = 0, minute = 0;
          auto ha_now = id(ha_time).now();
          if (ha_now.is_valid()) {
            hour = ha_now.hour;
            minute = ha_now.minute;
          } else {
            time_t est_epoch = (time_t)now_epoch - 5 * 3600;
            struct tm now_est_tm;
            gmtime_r(&est_epoch, &now_est_tm);
            hour = now_est_tm.tm_hour;
            minute = now_est_tm.tm_min;
          }

          int now_min = hour * 60 + minute;
          int start_min = (int)id(schedule_start_hour).state * 60 + (int)id(schedule_start_minute).state;
          int end_min = (int)id(schedule_end_hour).state * 60 + (int)id(schedule_end_minute).state;
          if (start_min == end_min) return;  // zero-length window
          bool in_window = (start_min < end_min)
              ? (now_min >= start_min && now_min < end_min)
              : (now_min >= start_min || now_min < end_min);
          if (!in_window) return;
          int dow_mon0 = 0;  // 0=Mon..6=Sun
          if (ha_now.is_valid()) {
            // ESPHome: day_of_week is 1=Sunday ... 7=Saturday.
            int dow_sun1 = ha_now.day_of_week;
            dow_mon0 = (dow_sun1 + 5) % 7;
          } else {
            time_t est_epoch = (time_t)now_epoch - 5 * 3600;
            struct tm now_est_tm;
            gmtime_r(&est_epoch, &now_est_tm);
            // tm_wday: 0=Sunday ... 6=Saturday.
            dow_mon0 = (now_est_tm.tm_wday + 6) % 7;
          }
          int blackout_mask = (int)id(blackout_weekday_bitmask).state;
          if (((blackout_mask >> dow_mon0) & 0x1) != 0) return;

          int mask = (int)id(zones_enabled_bitmask).state;
          int picked = 0;
          for (int zid = 1; zid <= 8 && picked == 0; zid++) {
            if (((mask >> (zid - 1)) & 0x1) == 0) continue;

            uint32_t last_finished = 0;
            float interval_h = 0;
            switch (zid) {
              case 1: last_finished = id(zone_1_last_finished_epoch); interval_h = id(zone_1_min_interval_hours).state; break;
              case 2: last_finished = id(zone_2_last_finished_epoch); interval_h = id(zone_2_min_interval_hours).state; break;
              case 3: last_finished = id(zone_3_last_finished_epoch); interval_h = id(zone_3_min_interval_hours).state; break;
              case 4: last_finished = id(zone_4_last_finished_epoch); interval_h = id(zone_4_min_interval_hours).state; break;
              case 5: last_finished = id(zone_5_last_finished_epoch); interval_h = id(zone_5_min_interval_hours).state; break;
              case 6: last_finished = id(zone_6_last_finished_epoch); interval_h = id(zone_6_min_interval_hours).state; break;
              case 7: last_finished = id(zone_7_last_finished_epoch); interval_h = id(zone_7_min_interval_hours).state; break;
              case 8: last_finished = id(zone_8_last_finished_epoch); interval_h = id(zone_8_min_interval_hours).state; break;
            }
            uint32_t interval_s = (uint32_t)(interval_h * 3600.0f);
            if (last_finished == 0) {
              // Safety net for unexpected zeroed NVS: treat as baseline date.
              last_finished = id(fallback_start_epoch_est);
            }
            bool due = (now_epoch >= last_finished + interval_s);
            if (due) picked = zid;
          }
          if (picked == 0) return;

          if (id(skip_next_run_pending)) {
            id(skip_next_run_pending) = false;
            ESP_LOGI("schedule", "Skip flag consumed; not firing zone %d.", picked);
            return;
          }
          id(due_zone_id) = picked;
      - if:
          condition:
            lambda: 'return id(due_zone_id) != 0;'
          then:
            - script.execute: schedule_fire_handler

script:
  - id: schedule_fire_handler
    mode: single
    then:
      # Pre-flight gates (rain hold, pressure, etc.) — same path as the
      # "Run full cycle" button uses, with is_schedule=true so the
      # fallback_schedule_enabled gate also applies.
      - script.execute:
          id: run_pre_flight
          is_schedule: true
      - wait_until:
          not:
            script.is_running: run_pre_flight
      - if:
          condition:
            lambda: 'return !id(pre_flight_passed);'
          then:
            - logger.log: "Cadence fire aborted: pre-flight failed."
            - lambda: 'id(due_zone_id) = 0;'
            - script.stop: schedule_fire_handler
      - lambda: |-
          if (id(time_synced).state) {
            id(last_run_started_epoch) = (uint32_t)id(effective_now_epoch).state;
          }
          ESP_LOGI("schedule", "Firing zone %d (cadence due).", id(due_zone_id));
      # Stage params and fire the retry-aware single-zone runner.
      - lambda: |-
          int zid = id(due_zone_id);
          float t = 0, c = 0, s = 0;
          switch (zid) {
            case 1: t = id(zone_1_total_min).state; c = id(zone_1_cycle_min).state; s = id(zone_1_soak_min).state; break;
            case 2: t = id(zone_2_total_min).state; c = id(zone_2_cycle_min).state; s = id(zone_2_soak_min).state; break;
            case 3: t = id(zone_3_total_min).state; c = id(zone_3_cycle_min).state; s = id(zone_3_soak_min).state; break;
            case 4: t = id(zone_4_total_min).state; c = id(zone_4_cycle_min).state; s = id(zone_4_soak_min).state; break;
            case 5: t = id(zone_5_total_min).state; c = id(zone_5_cycle_min).state; s = id(zone_5_soak_min).state; break;
            case 6: t = id(zone_6_total_min).state; c = id(zone_6_cycle_min).state; s = id(zone_6_soak_min).state; break;
            case 7: t = id(zone_7_total_min).state; c = id(zone_7_cycle_min).state; s = id(zone_7_soak_min).state; break;
            case 8: t = id(zone_8_total_min).state; c = id(zone_8_cycle_min).state; s = id(zone_8_soak_min).state; break;
          }
          id(staged_total_min) = t;
          id(staged_cycle_min) = c;
          id(staged_soak_min)  = s;
      - script.execute:
          id: run_one_zone_with_retry
          zone_id: !lambda 'return id(due_zone_id);'
          total_min: !lambda 'return id(staged_total_min);'
          cycle_min: !lambda 'return id(staged_cycle_min);'
          soak_min:  !lambda 'return id(staged_soak_min);'
      - wait_until:
          not:
            script.is_running: run_one_zone_with_retry
      - lambda: |-
          if (id(run_cancel_requested) && id(time_synced).state) {
            id(last_non_completed_attempt_epoch) = (uint32_t)id(effective_now_epoch).state;
          }
          id(current_phase_str) = id(any_alarm_latched) ? "fault" : "idle";
          id(phase_total_ms) = 0;
          if (id(time_synced).state) {
            id(last_run_finished_epoch) = (uint32_t)id(effective_now_epoch).state;
          }
          if (id(any_alarm_latched)) {
            id(last_run_outcome_str) = "cancelled_" + id(run_cancel_cause);
          } else {
            id(last_run_outcome_str) = "completed";
          }
          id(due_zone_id) = 0;

text_sensor:
  - platform: template
    name: "Current phase"
    id: current_phase
    update_interval: 1s
    lambda: 'return id(current_phase_str);'

  - platform: template
    name: "Last run outcome"
    id: last_run_outcome
    update_interval: 5s
    lambda: 'return id(last_run_outcome_str);'

  - platform: template
    name: "Last pre-flight failure reason"
    id: last_preflight_failure_reason
    update_interval: 2s
    lambda: |-
      if (id(pre_flight_reason).empty()) return std::string("none");
      return id(pre_flight_reason);

sensor:
  - platform: template
    name: "Currently running zone"
    id: currently_running_zone
    update_interval: 1s
    lambda: 'return (float)id(currently_on_zone);'
    accuracy_decimals: 0

  - platform: template
    name: "Current phase remaining (s)"
    id: current_phase_remaining_s
    update_interval: 1s
    accuracy_decimals: 0
    unit_of_measurement: "s"
    lambda: |-
      if (id(phase_total_ms) == 0) return 0.0f;
      uint32_t elapsed = millis() - id(phase_started_ms);
      if (elapsed >= id(phase_total_ms)) return 0.0f;
      return (id(phase_total_ms) - elapsed) / 1000.0f;

  - platform: template
    name: "Run progress %"
    id: run_progress_pct
    update_interval: 1s
    accuracy_decimals: 0
    unit_of_measurement: "%"
    lambda: |-
      if (id(run_goal_gallons) > 0.0f) {
        return (id(run_gallons_done) / id(run_goal_gallons)) * 100.0f;
      }
      if (id(run_total_min) == 0.0f) return 0.0f;
      return (id(run_minutes_done) / id(run_total_min)) * 100.0f;

  # Next-due zone (1..8), or 0 if nothing eligible right now ignoring window.
  # Surfaces "what's queued" to HA without re-implementing the window math.
  - platform: template
    name: "Next due zone"
    id: next_due_zone
    update_interval: 30s
    accuracy_decimals: 0
    lambda: |-
      uint32_t now_epoch = (uint32_t)id(effective_now_epoch).state;
      if (now_epoch == 0) return 0.0f;
      int mask = (int)id(zones_enabled_bitmask).state;
      for (int zid = 1; zid <= 8; zid++) {
        if (((mask >> (zid - 1)) & 0x1) == 0) continue;
        uint32_t last_finished = 0;
        float interval_h = 0;
        switch (zid) {
          case 1: last_finished = id(zone_1_last_finished_epoch); interval_h = id(zone_1_min_interval_hours).state; break;
          case 2: last_finished = id(zone_2_last_finished_epoch); interval_h = id(zone_2_min_interval_hours).state; break;
          case 3: last_finished = id(zone_3_last_finished_epoch); interval_h = id(zone_3_min_interval_hours).state; break;
          case 4: last_finished = id(zone_4_last_finished_epoch); interval_h = id(zone_4_min_interval_hours).state; break;
          case 5: last_finished = id(zone_5_last_finished_epoch); interval_h = id(zone_5_min_interval_hours).state; break;
          case 6: last_finished = id(zone_6_last_finished_epoch); interval_h = id(zone_6_min_interval_hours).state; break;
          case 7: last_finished = id(zone_7_last_finished_epoch); interval_h = id(zone_7_min_interval_hours).state; break;
          case 8: last_finished = id(zone_8_last_finished_epoch); interval_h = id(zone_8_min_interval_hours).state; break;
        }
        uint32_t interval_s = (uint32_t)(interval_h * 3600.0f);
        if (last_finished == 0) {
          // Match scheduler behavior when historical value is unexpectedly zero.
          last_finished = id(fallback_start_epoch_est);
        }
        if (now_epoch >= last_finished + interval_s) return (float)zid;
      }
      return 0.0f;

  - platform: template
    name: "Last run started (epoch)"
    id: last_run_started_at
    update_interval: 60s
    accuracy_decimals: 0
    lambda: 'return (float)id(last_run_started_epoch);'

  - platform: template
    name: "Last run finished (epoch)"
    id: last_run_finished_at
    update_interval: 60s
    accuracy_decimals: 0
    lambda: 'return (float)id(last_run_finished_epoch);'

  # Per-zone "last finished" sensors so HA can show "watered N hours ago".
  - platform: template
    name: "Zone 1 last finished (epoch)"
    id: zone_1_last_finished_at
    update_interval: 60s
    accuracy_decimals: 0
    lambda: 'return (float)id(zone_1_last_finished_epoch);'
  - platform: template
    name: "Zone 2 last finished (epoch)"
    id: zone_2_last_finished_at
    update_interval: 60s
    accuracy_decimals: 0
    lambda: 'return (float)id(zone_2_last_finished_epoch);'
  - platform: template
    name: "Zone 3 last finished (epoch)"
    id: zone_3_last_finished_at
    update_interval: 60s
    accuracy_decimals: 0
    lambda: 'return (float)id(zone_3_last_finished_epoch);'
  - platform: template
    name: "Zone 4 last finished (epoch)"
    id: zone_4_last_finished_at
    update_interval: 60s
    accuracy_decimals: 0
    lambda: 'return (float)id(zone_4_last_finished_epoch);'
  - platform: template
    name: "Zone 5 last finished (epoch)"
    id: zone_5_last_finished_at
    update_interval: 60s
    accuracy_decimals: 0
    lambda: 'return (float)id(zone_5_last_finished_epoch);'
  - platform: template
    name: "Zone 6 last finished (epoch)"
    id: zone_6_last_finished_at
    update_interval: 60s
    accuracy_decimals: 0
    lambda: 'return (float)id(zone_6_last_finished_epoch);'
  - platform: template
    name: "Zone 7 last finished (epoch)"
    id: zone_7_last_finished_at
    update_interval: 60s
    accuracy_decimals: 0
    lambda: 'return (float)id(zone_7_last_finished_epoch);'
  - platform: template
