# Weekly schedule fire + skip + catch-up + plan readouts.

globals:
  - id: skip_next_run_pending
    type: bool
    restore_value: true
    initial_value: 'false'
  - id: last_run_started_epoch
    type: uint32_t
    restore_value: true
    initial_value: '0'
  - id: last_fire_epoch
    type: uint32_t
    restore_value: true
    initial_value: '0'

  # --- Plan-readout state ---
  - id: current_phase_str
    type: std::string
    restore_value: false
    initial_value: '"idle"'
  - id: phase_started_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: phase_total_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: last_run_finished_epoch
    type: uint32_t
    restore_value: true
    initial_value: '0'
  - id: last_run_outcome_str
    type: std::string
    restore_value: true
    initial_value: '""'

button:
  - platform: template
    name: "Skip next run"
    id: skip_next_run
    icon: mdi:skip-next-circle
    on_press:
      - lambda: |-
          id(skip_next_run_pending) = true;
          ESP_LOGI("schedule", "Next run will be skipped.");

# Fire every 30s; check whether this is a scheduled fire time.
interval:
  - interval: 30s
    then:
      - lambda: |-
          if (!id(fallback_schedule_enabled).state) return;
          auto ha_now = id(ha_time).now();
          bool has_ha_time = ha_now.is_valid();
          uint32_t now_epoch = has_ha_time
              ? (uint32_t)ha_now.timestamp
              : (uint32_t)id(effective_now_epoch).state;
          if (now_epoch == 0) return;

          int target_h = (int)id(schedule_start_hour).state;
          int target_m = (int)id(schedule_start_minute).state;
          int hour = 0;
          int minute = 0;
          int day_of_week = 0;  // 1=Sun..7=Sat
          if (has_ha_time) {
            hour = ha_now.hour;
            minute = ha_now.minute;
            day_of_week = ha_now.day_of_week;
          } else {
            // Fallback wall clock is fixed EST (UTC-5), no DST rules.
            time_t est_epoch = (time_t)now_epoch - 5 * 3600;
            struct tm now_est_tm;
            gmtime_r(&est_epoch, &now_est_tm);
            hour = now_est_tm.tm_hour;
            minute = now_est_tm.tm_min;
            day_of_week = now_est_tm.tm_wday + 1;  // 0=Sun..6=Sat -> 1..7
          }
          if (hour != target_h || minute != target_m) return;

          bool day_match = false;
          switch (day_of_week) {
            case 1: day_match = id(sched_sun).state; break;
            case 2: day_match = id(sched_mon).state; break;
            case 3: day_match = id(sched_tue).state; break;
            case 4: day_match = id(sched_wed).state; break;
            case 5: day_match = id(sched_thu).state; break;
            case 6: day_match = id(sched_fri).state; break;
            case 7: day_match = id(sched_sat).state; break;
          }
          if (!day_match) return;
          if (id(last_fire_epoch) > 0 && now_epoch - id(last_fire_epoch) < 60) return;
          id(last_fire_epoch) = now_epoch;

          if (id(skip_next_run_pending)) {
            id(skip_next_run_pending) = false;
            ESP_LOGI("schedule", "Skip flag consumed; not firing this run.");
            return;
          }
          if (id(currently_on_zone) != 0) {
            ESP_LOGI("schedule", "Zone already on; fallback aborted.");
            return;
          }

          // Defer to ESPHome script execution outside the lambda.
          id(schedule_should_fire).publish_state(true);

binary_sensor:
  - platform: template
    name: "Schedule fire pending"
    id: schedule_should_fire
    internal: true
    on_press:
      - script.execute: schedule_fire_handler

script:
  - id: schedule_fire_handler
    mode: single
    then:
      - script.execute:
          id: run_full_cycle
          is_schedule: true
      - wait_until:
          not:
            script.is_running: run_full_cycle
      - binary_sensor.template.publish: { id: schedule_should_fire, state: false }

  # On first NTP sync, find the most recent scheduled fire within
  # `catchup_window_hours`. If we missed it (last_run_started_epoch < that fire),
  # fire it now. Idempotent within a boot — `last_run_started_epoch` updates
  # the moment a run begins so re-syncs don't double-fire.
  - id: maybe_catch_up
    mode: single
    then:
      - lambda: |-
          if (!id(time_synced).state) return;
          if (!id(fallback_schedule_enabled).state) return;
          if ((int)id(catchup_window_hours).state == 0) return;
          auto now = id(ha_time).now();
          if (!now.is_valid()) return;

          uint32_t now_epoch = now.timestamp;
          uint32_t window_s = (uint32_t)(id(catchup_window_hours).state * 3600.0f);
          int target_h = (int)id(schedule_start_hour).state;
          int target_m = (int)id(schedule_start_minute).state;

          int max_days = (int)((window_s / 86400) + 1);
          for (int d = 0; d <= max_days; d++) {
            time_t cand = (time_t)now_epoch - d * 86400;
            struct tm cand_tm;
            localtime_r(&cand, &cand_tm);
            cand_tm.tm_hour = target_h;
            cand_tm.tm_min = target_m;
            cand_tm.tm_sec = 0;
            time_t fire_epoch_t = mktime(&cand_tm);
            uint32_t fire_epoch = (uint32_t)fire_epoch_t;
            if (fire_epoch > now_epoch) continue;
            if (now_epoch - fire_epoch > window_s) return;

            int dow = cand_tm.tm_wday + 1;   // tm_wday: 0=Sun..6=Sat → 1..7
            bool day_match = false;
            switch (dow) {
              case 1: day_match = id(sched_sun).state; break;
              case 2: day_match = id(sched_mon).state; break;
              case 3: day_match = id(sched_tue).state; break;
              case 4: day_match = id(sched_wed).state; break;
              case 5: day_match = id(sched_thu).state; break;
              case 6: day_match = id(sched_fri).state; break;
              case 7: day_match = id(sched_sat).state; break;
            }
            if (!day_match) continue;

            if (id(last_run_started_epoch) >= fire_epoch) {
              ESP_LOGI("catchup", "Most recent fire was %us ago; already ran.",
                (unsigned)(now_epoch - fire_epoch));
              return;
            }
            ESP_LOGW("catchup", "Catching up missed fire from %us ago.",
              (unsigned)(now_epoch - fire_epoch));
            id(schedule_should_fire).publish_state(true);
            return;
          }

text_sensor:
  - platform: template
    name: "Current phase"
    id: current_phase
    update_interval: 1s
    lambda: 'return id(current_phase_str);'

  - platform: template
    name: "Last run outcome"
    id: last_run_outcome
    update_interval: 5s
    lambda: 'return id(last_run_outcome_str);'

sensor:
  - platform: template
    name: "Currently running zone"
    id: currently_running_zone
    update_interval: 1s
    lambda: 'return (float)id(currently_on_zone);'
    accuracy_decimals: 0

  - platform: template
    name: "Current phase remaining (s)"
    id: current_phase_remaining_s
    update_interval: 1s
    accuracy_decimals: 0
    unit_of_measurement: "s"
    lambda: |-
      if (id(phase_total_ms) == 0) return 0.0f;
      uint32_t elapsed = millis() - id(phase_started_ms);
      if (elapsed >= id(phase_total_ms)) return 0.0f;
      return (id(phase_total_ms) - elapsed) / 1000.0f;

  - platform: template
    name: "Run progress %"
    id: run_progress_pct
    update_interval: 1s
    accuracy_decimals: 0
    unit_of_measurement: "%"
    lambda: |-
      if (id(run_total_min) == 0) return 0.0f;
      return (id(run_minutes_done) / id(run_total_min)) * 100.0f;

  - platform: template
    name: "Next planned run (epoch)"
    id: next_planned_run
    update_interval: 60s
    accuracy_decimals: 0
    unit_of_measurement: "s"
    lambda: |-
      if (!id(time_synced).state) return 0.0f;
      auto now = id(ha_time).now();
      if (!now.is_valid()) return 0.0f;
      uint32_t now_epoch = now.timestamp;
      int target_h = (int)id(schedule_start_hour).state;
      int target_m = (int)id(schedule_start_minute).state;
      for (int d = 0; d < 8; d++) {
        time_t cand = (time_t)now_epoch + d * 86400;
        struct tm cand_tm;
        localtime_r(&cand, &cand_tm);
        cand_tm.tm_hour = target_h;
        cand_tm.tm_min = target_m;
        cand_tm.tm_sec = 0;
        time_t fire = mktime(&cand_tm);
        if ((uint32_t)fire <= now_epoch) continue;
        int dow = cand_tm.tm_wday + 1;
        bool match = false;
        switch (dow) {
          case 1: match = id(sched_sun).state; break;
          case 2: match = id(sched_mon).state; break;
          case 3: match = id(sched_tue).state; break;
          case 4: match = id(sched_wed).state; break;
          case 5: match = id(sched_thu).state; break;
          case 6: match = id(sched_fri).state; break;
          case 7: match = id(sched_sat).state; break;
        }
        if (match) return (float)fire;
      }
      return 0.0f;

  - platform: template
    name: "Last run started (epoch)"
    id: last_run_started_at
    update_interval: 60s
    accuracy_decimals: 0
    lambda: 'return (float)id(last_run_started_epoch);'

  - platform: template
    name: "Last run finished (epoch)"
    id: last_run_finished_at
    update_interval: 60s
    accuracy_decimals: 0
    lambda: 'return (float)id(last_run_finished_epoch);'
