# Rain (binary), flow (pulse), pressure (ADC + linear calibration).
#
# GPIOs below intentionally avoid relay-control pins on the x8 relay board.
# Keep these separate from relay pins to prevent accidental cross-triggering.

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO18
      mode:
        input: true
        pullup: true
      inverted: true   # rain sensor closes-on-wet pulls GPIO low
    name: "Rain sensor"
    id: rain_sensor
    device_class: moisture
    filters:
      - delayed_on_off: 500ms
    on_press:
      - lambda: |-
          if (id(time_synced).state) {
            id(rain_sensor_last_wet_epoch) = (uint32_t)id(effective_now_epoch).state;
          }

sensor:
  # Flow meter: pulses + smoothed rate.
  # Hardware path: 12V 2-wire meter sensed through a 4N35 optocoupler.
  # ESP32 side is open-collector: 4N35 pin5 -> GPIO19, pin4 -> GND,
  # external 10k pull-up to 3.3V on GPIO19.
  - platform: pulse_meter
    name: "Irrigation Flow Pulses"
    id: flow_pulses
    pin:
      number: GPIO19
      mode:
        input: true
      inverted: false
    unit_of_measurement: "pulses/min"
    total:
      name: "Flow Pulses Total"
      id: flow_pulses_total
      unit_of_measurement: "pulses"
      accuracy_decimals: 0
    
  - platform: template
    name: "Flow Rate (GPM)"
    id: flow_rate_gpm
    unit_of_measurement: "GPM"
    icon: "mdi:water"
    lambda: |-
      float ppm = id(flow_pulses).state;  // pulses per minute
      float ppg = id(pulses_per_gallon).state;
      if (ppg <= 0.0f) return 0.0f;
      return ppm / ppg;
    update_interval: 60s

  # Pressure: ADC1 input from pressure sensor through a 10k/20k divider.
  # ADC node sees ~2/3 of transducer output.
  - platform: adc
    pin: GPIO34       # ADC1 (32-39); input-only on this WROOM board
    name: "Pressure"
    id: pressure_psi
    update_interval: 1s
    attenuation: 11db
    accuracy_decimals: 1
    unit_of_measurement: "psi"
    filters:
      - sliding_window_moving_average:
          window_size: 5
          send_every: 1
      # Calibration points below are for the divider midpoint (R4=10k, R5=20k).
      # IMPORTANT: ESP32 ADC pin must stay <= 3.3V at all times.
      - calibrate_linear:
          method: exact
          datapoints:
            - 0.000 -> 0.0
            - 0.240 -> 10.0
            - 0.460 -> 20.0
            - 0.680 -> 30.0
            - 0.900 -> 40.0
            - 1.120 -> 50.0
            - 1.360 -> 60.0
            - 1.600 -> 70.0
            - 1.840 -> 80.0
            - 2.080 -> 90.0
            - 2.320 -> 100.0
      - clamp:
          min_value: 0.0
          max_value: 100.0
